            Текущая метка времени сервера, до которой сообщения должны быть
            удалены.
        file_retention_cutoff:
          type: integer
          description: |
            Текущая метка времени сервера, до которой файлы должны быть удалены.
    DataRetentionPolicyWithoutId:
