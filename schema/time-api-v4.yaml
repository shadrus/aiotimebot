        Автозаполнение публичных каналов в команде на основе поискового термина,
        указанного в URL запроса.

        __Минимальная версия сервера__: 4.7

        ##### Разрешения

        Необходимо быть членом команды. Результаты поиска ограничены каналами, к
        которым пользователь имеет доступ.
      operationId: AutocompleteChannelsForTeam
      parameters:
        - name: team_id
          in: path
          description: GUID команды
          required: true
          schema:
            type: string
        - name: name
          in: query
          description: Имя или отображаемое имя
          required: true
          schema:
            type: string
        - name: channel_types
          in: query
          description: |
            Массив типов каналов.
            Тип канала - одно из возможных значений: 'G'-групповой канал,
            'P'-приватный канал, 'O'-открытый канал, 'D' - личные сообщения.
            При 'D' - поиск перенаправляется на autocomplete/users
          schema:
            type: array
            items:
              $ref: "#/components/schemas/ChannelTypeForTeam"
        - name: archived
          in: query
          description: >
            Если установлено значение true, результат будет содержать только
            архивированные каналы. Если установлено значение false, результат
            будет содержать только неархивированные каналы. Если не установлено,
            результат будет содержать как архивированные, так и неархивированные
            каналы.
          required: false
          schema:
            type: boolean
        - name: boost
          in: query
          description: >
            Если установлено значение true, каналы, посещенные пользователем,
            размещаются в начале [0; boost_limit) ответа поиска. Сейчас
            boost_limit == search_limit.
          required: false
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Успешное автозаполнение каналов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
