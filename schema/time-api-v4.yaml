          $ref: "#/components/responses/BadRequest"
  /api/v4/users/login/switch:
    post:
      tags:
        - Users
      summary: Переключить метод входа
      description: >
        Переключите метод входа пользователя с использования электронной почты
        на OAuth2/OpenID/SAML/LDAP или обратно на электронную почту. При
        переключении на OAuth2/SAML, переключение учетной записи не завершено,
        пока пользователь не перейдет по возвращенной ссылке и не выполнит все
        шаги на стороне провайдера OAuth2/SAML.

        Чтобы переключиться с электронной почты на OAuth2/OpenID/SAML, укажите
        `current_service`, `new_service`, `email` и `password`. Сессия не
        требуется.

        Чтобы переключиться с OAuth2/OpenID/SAML на электронную почту, укажите
        `current_service`, `new_service`, `email` и `new_password`. Требуется
        активная сессия пользователя с той же `email`, что указана в запросе.

        Чтобы переключиться с электронной почты на LDAP/AD, укажите
        `current_service`, `new_service`, `email`, `password`, `ldap_id` и
        `new_password` (это пароль пользователя LDAP). Сессия не требуется.

        Чтобы переключиться с LDAP/AD на электронную почту, укажите
        `current_service`, `new_service`, `ldap_id`, `password` (это пароль
        пользователя LDAP), `email` и `new_password`. Сессия не требуется.

        Кроме того, укажите `mfa_code`, если пытаетесь переключить учетную
        запись на LDAP/AD или электронную почту, для которой активирована MFA.

        ##### Разрешения

        Текущая аутентификация не требуется, кроме случаев переключения с
        OAuth2/OpenID/SAML на электронную почту.
      operationId: SwitchAccountType
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - current_service
                - new_service
              properties:
                current_service:
                  description: Сервис, который пользователь в настоящее время использует для входа
                  type: string
                new_service:
                  description: Сервис, который пользователь будет использовать для входа
                  type: string
                email:
                  description: Электронная почта пользователя
                  type: string
                password:
                  description: Пароль, используемый с текущим сервисом
                  type: string
                mfa_code:
                  description: Код MFA текущего сервиса
                  type: string
                ldap_id:
                  description: Идентификатор LDAP/AD пользователя
                  type: string
        required: true
      responses:
        "200":
          description: Успешное переключение метода входа или запрос
          content:
            application/json:
              schema:
                type: object
                properties:
                  follow_link:
                    description: >
                      Ссылка, по которой пользователь должен перейти для входа
                      или завершения переключения учетной записи, когда текущий
                      сервис - OAuth2/SAML
                    type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v4/users/{user_id}/tokens:
    post:
      tags:
        - Users
      summary: Создать токен доступа пользователя
      description: >
        Генерирует токен доступа пользователя, который может быть использован
        для аутентификации с REST API Time.

        __Минимальная версия сервера__: 4.1

        ##### Разрешения

        Должно быть разрешение `create_user_access_token`. Для запросов не от
        себя, также должно быть разрешение `edit_other_users`.
      operationId: CreateUserAccessToken
      parameters:
        - name: user_id
          in: path
          description: GUID пользователя
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - description
              properties:
                description:
                  description: Описание использования токена
                  type: string
        required: true
      responses:
        "201":
          description: Успешное создание токена доступа пользователя
          content:
