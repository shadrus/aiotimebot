  /api/v4/teams/{team_id}/posts/search:
    post:
      tags:
        - Posts
      summary: Поиск постов команды
      description: |
        Поиск постов в команде и по предоставленной строке условий.
        ##### Разрешения
        Должен быть авторизован и иметь разрешение `view_team`.
      operationId: SearchPosts
      parameters:
        - name: team_id
          in: path
          description: GUID команды
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - terms
                - is_or_search
              properties:
                terms:
                  type: string
                  description: >
                    Условия поиска, введенные пользователем. Чтобы искать посты
                    от пользователя, включите `from:someusername`, используя имя
                    пользователя. Чтобы искать в конкретном канале, включите
                    `in:somechannel`, используя имя канала (не отображаемое
                    имя).
                is_or_search:
                  type: boolean
                  description: >
                    Установите значение true, если должен быть выполнен поиск по
                    OR, а не по AND.
                time_zone_offset:
                  type: integer
                  default: 0
                  description: >
                    Смещение от UTC временной зоны пользователя для поиска по
                    датам.
                include_deleted_channels:
                  type: boolean
                  description: >
                    Установите значение true, если удаленные каналы должны быть
                    включены в поиск. (архивированные каналы)
                page:
                  type: integer
                  default: 0
                  description: |
                    Выбранная страница. (Работает только с Elasticsearch)
                per_page:
                  type: integer
                  default: 60
                  description: >
                    Количество постов на странице. (Работает только с
                    Elasticsearch)
        description: Условия поиска и логика для использования в поиске.
        required: true
      responses:
        "200":
          description: Успешное получение списка постов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostSearchResults"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
