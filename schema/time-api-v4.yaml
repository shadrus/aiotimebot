        лицензией.
      operationId: GetMaintenanceJobsByType
      parameters:
        - name: type
          in: path
          description: >
            Тип задачи.

            Допустимые значения:
              - `elasticsearch_post_indexing` — в случае использования в time-server движка поиска elastic-engine.
              - `saassearch_post_indexing` — в случае использования в time-server движка поиска search-engine.
          required: true
          schema:
            type: string
            enum:
              - elasticsearch_post_indexing
