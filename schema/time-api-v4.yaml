      summary: Выполнить действие поста
      description: >
        Выполнить действие поста, которое позволяет пользователям
        взаимодействовать с интеграциями через посты.

        ##### Разрешения

        Должен быть авторизован и иметь разрешение `read_channel` для канала, в
        котором находится пост.
      operationId: DoPostAction
      parameters:
        - name: post_id
          in: path
          description: GUID поста
          required: true
          schema:
            type: string
        - name: action_id
          in: path
          description: GUID действия
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                selected_option:
                  type: string
                  description: >
                    Значение выбранной опции для кнопки с типом Select в
                    интерактивном сообщении
                cookie:
                  type: string
                  description: >
                    Зашифрованные метаданные действия, полученные ранее от
                    сервера в поле `cookie` объекта действия поста. Клиент
                    должен сохранить это значение и передавать его в последующих
                    запросах для того же действия — это позволяет серверу
                    получить доступ к метаданным действия, даже если пост уже
                    недоступен в базе данных (например, для эфемерных постов).
        description: Объект с параметрами, необходимыми для выполнения действия поста
        required: false
      responses:
        "200":
          description: Успешное выполнение действия поста
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: |
                      Будет содержать "ok", если запрос был успешным
                  trigger_id:
                    type: string
                    description: >
                      ID триггера, который можно использовать для открытия
                      интерактивного диалога в ответ на это действие
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
