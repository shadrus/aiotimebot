  /api/v4/cloud/maintenance/jobs:
    post:
      tags:
        - Cloud
      summary: Создать новую задачу обслуживания
      description: >
        Создать новую задачу обслуживания с указанным типом и дополнительными
        данными.

        #### Разрешения

        Для выполнения запроса необходимо передать значение из переменной
        окружения `TIME_CLOUD_API_KEY` в заголовке `X-Cloud-Token`.

        __Примечание:__ Этот эндпоинт доступен только в экземпляре Time с Cloud
        лицензией.
      operationId: CreateMaintenanceJob
      requestBody:
        description: Объект с параметрами для создания задачи
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - elasticsearch_post_indexing
                    - saassearch_post_indexing
                  description: >
                    Тип задачи для создания.


                    Допустимые значения:

                    - `elasticsearch_post_indexing` — если в time-server
                    используется поисковый движок **elastic-engine**.

                    - `saassearch_post_indexing` — если в time-server
                    используется поисковый движок **search-engine**.
                data:
                  type: object
                  description: >
                    Опциональный объект, указывающий, какие сущности следует
                    проиндексировать в рамках создаваемой задачи.


                    Каждое поле — это JSON-строка (например, `"{}"`),
                    определяющая параметры индексации для конкретной сущности.


                    Допустимые поля:

                    - `channels` — индексировать каналы

                    - `posts` — индексировать посты

                    - `users` — индексировать пользователей

                    - `files` — индексировать файлы

                    - `emojis` — индексировать эмодзи

                    - `hashtags` — индексировать хештеги


                    Если объект `data` не передан — **будут проиндексированы все
                    сущности**.
                  properties:
                    channels:
                      type: string
                      description: Параметры индексации каналов
                      example: "{}"
                    posts:
                      type: string
                      description: Параметры индексации постов
                      example: "{}"
                    users:
                      type: string
                      description: Параметры индексации пользователей
                      example: "{}"
                    files:
                      type: string
                      description: Параметры индексации файлов
                      example: "{}"
                    emojis:
                      type: string
                      description: Параметры индексации эмодзи
                      example: "{}"
                    hashtags:
                      type: string
                      description: Параметры индексации хештегов
                      example: "{}"
                  example:
                    channels: "{}"
                    posts: "{}"
                    users: "{}"
              example:
                type: elasticsearch_post_indexing
                data:
                  channels: "{}"
                  posts: "{}"
                  users: "{}"
      responses:
        "201":
          description: Успешное создание задачи
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v4/cloud/maintenance/jobs/type/{type}:
    get:
      tags:
        - Cloud
      summary: Получить задачи обслуживания указанного типа
      description: >
        Получить страницу задач обслуживания указанного типа.

