  /api/v4/users/migrate_auth/ldap:
    post:
      tags:
        - Users
        - Migrate
        - LDAP
      summary: Миграция типа аутентификации учетных записей пользователей на LDAP.
      description: >
        Миграция учетных записей от одного провайдера аутентификации к другому.
        Например, вы можете обновить своего провайдера аутентификации с
        электронной почты на LDAP.

        __Минимальная версия сервера__: 5.28

        ##### Разрешения

        Необходимо иметь разрешение `manage_system`.
      operationId: MigrateAuthToLdap
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - from
                - match_field
                - force
              properties:
                from:
                  description: |
                    Текущий тип аутентификации для совпадающих пользователей.
                  type: string
                  enum:
                    - email
                    - gitlab
                    - saml
                    - google
                    - openid
                match_field:
                  description: >
                    Совпадение по полю `email` или `username`. Пользователь LDAP
                    будет считаться тем же пользователем, если у него есть
                    аналогичное значение имени пользователя/электронной почты.
                  type: string
                  enum:
                    - username
                    - email
                force:
                  type: boolean
      responses:
        "200":
          description: Успешная миграция типа аутентификации на LDAP.
        "400":
          $ref: "#/components/responses/BadRequest"
