        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v4/posts:
    post:
      tags:
        - Posts
      summary: Создать пост
      description: >
        Создайте новый пост в канале. Чтобы создать пост как комментарий к
        другому посту, укажите `root_id`.

        ##### Разрешения

        Должно быть разрешение `create_post` для канала, в котором создается
        пост.
      operationId: CreatePost
      parameters:
        - name: set_online
          in: query
          description: Установить статус пользователя как онлайн или нет.
          required: false
          schema:
            type: boolean
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                idempotency_key:
                  type: string
                  description: >
                    Ключ идемпотентности. Уникальный идентификатор, позволяющий
                    клиенту повторять запрос без создания дублирующих постов. Он
                    гарантирует, что даже если запрос отправляется несколько
                    раз, операция будет обработана на стороне сервера только
                    один раз. Алгоритм генерации ключа идемпотентности лежит на
                    стороне клиента. Так-же, клиент обязан не использовать один
                    и тот же ключ идемпотентности для разных запросов. Ключ
                    инвалидируется на сервере через 30 секунд после первичного
                    использования.


                    Примеры:
                     - `2fa41c7f-12f1-4b4b-9d55-af4c2869c07c`
                     - `1752482846000`
                channel_id:
                  type: string
                  description: >
                    ID канала для публикации. Является обязательным полем в
                    случае, если не задан peer
                peer:
                  type: string
                  description: >
                    Объект, в котором будет создан пост.

                    `channel_id` имеет более высокий приоритет и не будет
                    перезаписан, если он присутствует.

                    Если peer имеет префикс `@`, сообщение будет отправлено в
                    личный канал пользователя по имени пользователя. Префикс
                    `U:` - сообщение будет отправлено в личный канал
                    пользователя по UserID. В любом другом случае будет иметь
                    тот же эффект, что и `channel_id`. Пример использования:
                      - `@yoona`. (Сообщение будет отправлено пользователю `yoona` по имени пользователя)
                      - `U:9ayyzd4nciyc3ptamsk6g4s3dy`. (Сообщение будет отправлено пользователю `yoona` по UserID)
                      - `ztxuytftsprjub9pxx81byjosy`. (Сообщение будет отправлено в канал, используя ChannelID)
                message:
                  type: string
                  description: >
                    Содержимое сообщения, может быть отформатировано с помощью
                    Markdown
                root_id:
                  type: string
                  description: ID поста для комментария
                file_ids:
                  type: array
                  description: >
                    Список ID файлов для ассоциации с постом. Обратите внимание,
                    что посты ограничены максимум 5 файлами. Пожалуйста,
                    используйте дополнительные посты для большего количества
                    файлов.
                  items:
                    type: string
                props:
                  description: |
                    Общий JSON-свойств для прикрепления к посту
                  $ref: "#/components/schemas/PostProps"
        description: Объект поста для создания
        required: true
      responses:
        "201":
          description: Успешное создание поста
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v4/posts/ephemeral:
    post:
      tags:
        - Posts
      summary: Создать эфемерный пост
      description: >
        Создайте новый эфемерный пост в канале.

        ##### Разрешения

        Должно быть разрешение `create_post_ephemeral` (в настоящее время только
        для системного администратора)
      operationId: CreatePostEphemeral
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - post
              properties:
                user_id:
                  type: string
                  description: ID целевого пользователя для эфемерного поста
                post:
                  type: object
                  required:
                    - channel_id
                    - message
                  description: Объект поста для создания
                  properties:
                    channel_id:
                      type: string
                      description: ID канала для публикации
                    message:
                      type: string
                      description: >
                        Содержимое сообщения, может быть отформатировано с
                        помощью Markdown
        description: Эфемерный объект поста для отправки
        required: true
      responses:
        "201":
          description: Успешное создание поста
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-codeSamples:
        - lang: Go
          source: |
            client := model.NewAPIv4Client("https://time-url.domain")
            client.Login("email@domain.com", "Password1")

            ephemeralPost := &model.PostEphemeral{
              UserID: "<ID OF THE USER THAT WOULD RECEIVE THE POST>",
              Post: &model.Post{
                ChannelId: "<ID OF CHANNEL>",
                Message:   "<YOUR MESSAGE>",
              },
            }

            createdPost, response := client.CreatePostEphemeral(ephemeralPost)
  /api/v4/posts/readers:
    post:
      tags:
        - Posts
      summary: Получить список прочитавших посты
      description: >
        Получить список пользователей, прочитавших посты, для которых
        запрашивающий пользователь является автором. Посты не от автора запроса
        исключаются из ответа, а также посты в каналах с отключённой настройкой
        «Статус прочтения сообщений». За один запрос можно передать не более 100
        постов.


        Поведение ответа зависит от размера канала:


        - **Малый канал (< 100 участников)** — возвращаются полные списки
        `readers` и `non_readers` для всех участников канала (кроме автора).


        - **Большой канал (≥ 100 участников), нет личных упоминаний или только
        `@channel`/`@here`** — возвращается только счётчик `read_count` /
        `total_count`, списки `readers` и `non_readers` пусты. `total_count`
        равен числу участников канала минус автор.


        - **Большой канал, личных упоминаний < 100** — `readers` и `non_readers`
        содержат только упомянутых пользователей. `total_count` равен числу
        упоминаний.


        - **Большой канал, личных упоминаний ≥ 100** — только счётчики,
        `total_count` равен числу упоминаний.


        ##### Разрешения


        Должен быть авторизован. Возвращает данные только по постам
        запрашивающего пользователя.
      operationId: GetPostsReaders
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - post_ids
              properties:
                post_ids:
                  type: array
                  description: Список ID постов. Не более 100 элементов.
                  maxItems: 100
                  items:
                    type: string
        required: true
      responses:
        "200":
          description: Успешное получение списка прочитавших
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsReadersResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v4/posts/readers/flag:
    post:
      tags:
        - Posts
      summary: Получить статус постов (прочитано/не прочитано)
      description: >
        Получить статус постов (прочитано/не прочитано) для постов в приватном
        канале или треде приватного канала, написанные автором запроса. За один
