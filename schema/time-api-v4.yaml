  /api/v4/teams:
    post:
      tags:
        - Teams
      summary: Создать команду
      description: |
        Создать новую команду в системе.
        ##### Разрешения
        Должен быть аутентифицирован и иметь разрешение `create_team`.
      operationId: CreateTeam
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - display_name
                - type
              properties:
                name:
                  type: string
                  description: >
                    Уникальный идентификатор команды, будет присутствовать в URL
                    команды
                display_name:
                  type: string
                  description: Неуникальное имя для отображения команды в интерфейсе
                type:
                  type: string
                  description: "`'O'` для открытой, `'I'` для только по приглашению"
        description: Команда, которую нужно создать
        required: true
      responses:
        "201":
          description: Успешное создание команды
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      tags:
        - Teams
      summary: Получить команды
      description: >
        Для обычных пользователей возвращаются только открытые команды.
        Пользователи с разрешением "manage_system" могут видеть команды
        независимо от типа. Результат основан на параметрах строки запроса -
        page и per_page.

        ##### Разрешения

        Должен быть аутентифицирован. Разрешение "manage_system" требуется для
        отображения всех команд.
      operationId: GetAllTeams
      parameters:
        - name: page
          in: query
          description: Выбранная страница.
          schema:
            type: integer
            default: 0
        - name: per_page
          in: query
          description: Количество команд на странице.
          schema:
            type: integer
            default: 60
        - name: include_total_count
          in: query
          schema:
            type: boolean
            default: false
        - name: exclude_policy_constrained
          in: query
          schema:
            type: boolean
            default: false
          description: >
            Если установлено значение true, команды, которые являются частью
            политики сохранения данных, будут исключены. Разрешение
            `sysconsole_read_compliance` требуется для использования этого
            параметра.

            __Минимальная версия сервера__: 5.35
        - name: can_join
          in: query
          description: >
            Этот параметр используется для фильтрации команд, к которым
            пользователь не может присоединиться. (уже вошел, фильтр по
            электронной почте)
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Успешное получение списка команд
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items:
                      $ref: "#/components/schemas/Team"
                    description: Возвращается, если `include_total_count=false` или не указано.
                  - type: object
                    properties:
                      total_count:
                        type: integer
                        description: Общее количество элементов.
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/Team"
                      has_next:
                        type: boolean
                        description: >
                          Указывает, есть ли еще одна страница команд, которую
                          можно получить.
                    description: Возвращается, если `include_total_count=true`.
                    required:
                      - total_count
                      - items
                      - has_next
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
