        которого электронная почта совпадает с указанной в теле запроса. Эта
        конечная точка вернет успех, даже если электронная почта не совпадает ни
        с одним пользователем в системе.

        ##### Разрешения

        Разрешения не требуются.
      operationId: SendVerificationEmail
      requestBody:
        content:
          application/json:
