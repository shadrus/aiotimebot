            default: 0
        - name: per_page
          in: query
          description: >
            Количество пользователей на странице. Максимальный лимит - 200
            пользователей на страницу.
          schema:
            type: integer
            default: 60
        - name: include_deleted
          in: query
          description: Если удаленные боты должны быть возвращены.
          schema:
            type: boolean
        - name: only_orphaned
          in: query
          description: >
            Если true, будут возвращены только сиротские боты. Бот считается
            сиротским, если его владелец был деактивирован.
