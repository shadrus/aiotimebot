      description: >
        Миграция учетных записей от одного провайдера аутентификации к другому.
        Например, вы можете обновить своего провайдера аутентификации с
        электронной почты на SAML. __Минимальная версия сервера__: 5.28 #####
        Разрешения Необходимо иметь разрешение `manage_system`.
      operationId: MigrateAuthToSaml
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - from
                - matches
                - auto
              properties:
                from:
                  description: |
                    Текущий тип аутентификации для совпадающих пользователей.
                  type: string
                  enum:
                    - email
                    - gitlab
                    - ldap
                    - google
                matches:
                  description: >
                    Карта пользователей: `{"email1" : "authData1", "email2":
                    "authData2}`. Существующий пользователь Time с `email` будет
                    использовать `authData` как идентификатор аутентификации.
                    `AuthData` - это соответствующее значение атрибута `ID`
                    пользователя на странице SAML в системной консоли.
                  type: object
                auto:
                  description: >
                    Вы можете установить auto в true и передать пустой объект
                    `matches`. В этом случае все пользователи, использующие тип
                    аутентификации `from`, будут обработаны. Имя пользователя
                    будет использоваться как поле authData. Значение атрибута
                    `ID` пользователя на странице SAML в системной консоли
                    должно указывать на имя пользователя.
                  type: boolean
      responses:
        "200":
          description: Успешная миграция типа аутентификации на SAML.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v4/users/migrate_auth/openid:
    post:
      tags:
