        $ref: "#/components/schemas/ChannelSuggestion"
    EmailInviteWithError:
      type: object
      properties:
        user_id:
          type: string
          description: ID пользователя
        email:
          type: string
          description: email
        got_invite_earlier:
          type: string
          description: пользователь уже имеет приглашение в этой команде
        sent:
          type: boolean
          description: Приглашение было отправлено
        added:
          type: boolean
          description: Пользователь был добавлен в каналы
        error:
          allOf:
            - $ref: "#/components/schemas/AppError"
            - type: object
              properties:
                params:
                  type: object
                  properties:
                    retry_after_second:
                      type: integer
                      description: Время в секундах для повторной отправки приглашения
                    remaining_sendings:
                      type: integer
                      description: >
                        Указывает количество приглашений по электронной почте,
                        которые пользователь все еще может попытаться отправить
                        в рамках текущих ограничений скорости.
    EmailInviteWithErrorList:
      type: array
      items:
        $ref: "#/components/schemas/EmailInviteWithError"
    SearchIndexType:
      type: string
      enum:
        - post
        - file
        - channel
        - user
        - hashtag
    ConfcallTokenResponse:
      type: object
      properties:
        token:
          type: string
          description: Токен для присоединения к конференц-звонку
    IDWithErrorList:
      type: object
      properties:
        id:
          type: string
          description: ID элемента
        error:
          $ref: "#/components/schemas/AppError"
      required:
        - id
    IncomingWebhookRequest:
      type: object
      description: Полезная нагрузка для входящего запроса вебхука.
      properties:
        text:
          type: string
          description: Обязательно, если `attachments` не установлен.
        username:
          type: string
        icon_url:
          type: string
          format: uri
        channel:
          type: string
        props:
          type: object
        attachments:
          type: array
          description: Обязательно, если `text` не установлен.
          items:
            $ref: "#/components/schemas/SlackAttachment"
        type:
          type: string
        icon_emoji:
          type: string
    UserCustomStatus:
      type: object
      required:
        - emoji
        - text
        - expires_at
      properties:
        emoji:
          type: string
          description: Любой эмодзи
        text:
          type: string
          description: Любой текст пользовательского статуса
        duration:
          $ref: "#/components/schemas/StatusDuration"
          description: >
            Продолжительность пользовательского статуса, может быть
            `thirty_minutes`, `one_hour`, `four_hours`, `today`, `this_week` или
            `date_and_time`
        expires_at:
          type: string
          description: >
            Время, когда пользовательский статус должен истечь. Должно быть в
            формате ISO.
    StatusDuration:
      type: string
      enum:
        - thirty_minutes
        - one_hour
        - four_hours
        - today
        - this_week
        - date_and_time
      x-enum-varnames:
        - ThirtyMinutes
        - OneHour
        - FourHours
        - Today
        - ThisWeek
        - DateAndTime
    UserStatus:
      type: string
      enum:
        - online
        - away
        - offline
        - dnd
      x-enum-varnames:
        - Online
        - Away
        - Offline
        - Dnd
    UserMentionNotificationType:
      type: string
      enum:
        - all
        - mention
        - none
      x-enum-varnames:
        - All
        - Mention
        - None
    UserReactionsNotificationType:
      type: string
      enum:
        - conversation
        - direct
        - none
      x-enum-varnames:
        - Conversation
        - Direct
        - None
    SubmitInteractiveDialogResult:
      type: object
      properties:
        status:
          description: >
            Будет содержать "ok", если запрос был успешным и больше нечего
            возвращать
          type: string
        error:
          description: |
            Будет содержать описание ошибки, если запрос был неуспешным
          type: string
    Application:
      type: object
      properties:
        id:
          type: string
        create_at:
          type: integer
          format: int64
        update_at:
          type: integer
          format: int64
        delete_at:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        creator_id:
          type: string
        icon:
          type: string
        manifest:
          $ref: "#/components/schemas/ApplicationManifest"
      required:
        - id
        - create_at
        - update_at
        - delete_at
        - name
        - description
        - creator_id
        - manifest
    ApplicationManifest:
      type: object
      title: Application Manifest
      description: Schema for Time Application manifest
      required:
        - name
        - description
        - components
      properties:
        name:
          type: string
          description: Human-readable name of the application.
        description:
          type: string
          description: Detailed description of what the application does.
        icon:
          type: string
          format: uri
          description: Icon for the application (URL).
        components:
          $ref: "#/components/schemas/ApplicationComponents"
    ApplicationComponents:
      type: object
      required:
        - bot
      properties:
        bot:
          $ref: "#/components/schemas/ApplicationBot"
          description: Bot definition for the application.
        slash_commands:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationCommand"
          description: List of slash commands exposed by the application.
    ApplicationBot:
      type: object
      required:
        - username
        - display_name
        - role
      properties:
        username:
          type: string
          description: Desired username for the bot. Server may add numeric suffix if
            username is taken.
        display_name:
          type: string
          description: Human-readable display name of the bot.
        role:
          type: string
          enum:
            - member
            - system_admin
          description: Role under which bot executes actions.
        additional_permissions:
          type: array
          description: Additional posting permissions for the bot.
          items:
            type: string
            enum:
              - post:all
              - post:channels
    ApplicationCommand:
      type: object
      required:
        - trigger_word
        - title
        - list_in_autocomplete
        - request
      properties:
        trigger_word:
          type: string
          description: Command trigger (without leading slash). Must be unique within the
            application.
        title:
          type: string
          description: Command title shown to users.
        list_in_autocomplete:
          type: boolean
          description: Whether this command should appear in autocomplete.
        autocomplete_hint:
          type: string
          description: Optional hint describing command parameters for autocomplete.
        autocomplete_description:
          type: string
          description: Additional description shown in autocomplete.
        request:
          $ref: "#/components/schemas/ApplicationCommandRequest"
          description: HTTP request configuration for the slash command backend.
    ApplicationCommandRequest:
      type: object
      required:
        - method
        - url
      properties:
        method:
          type: string
          enum:
            - GET
            - POST
          description: HTTP method used when invoking this command.
        url:
          type: string
          format: uri
          description: Callback URL invoked when the command is executed.
    ApplicationOwner:
      type: object
      properties:
        application_id:
          type: string
        owner_id:
          type: string
    ApplicationIDsForTeam:
      type: object
      properties:
        applications:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationOwner"
    ApplicationTokens:
      type: object
      properties:
        bot_token:
          description: Токен бота для приложения
          type: string
        command_token:
          description: Токен слеш-команды для приложения
          type: string
    PostReaderEntry:
      type: object
      properties:
        user_id:
          type: string
          description: ID пользователя
        mention:
          type: boolean
          description: >
            Флаг личного упоминания пользователя в посте (`@username` или
            упоминание группы). Массовые теги (`@channel`, `@here`) не считаются
            личным упоминанием и не выставляют этот флаг.
        read_at:
          type: integer
          format: int64
          description: >
            Unix-время в миллисекундах, когда пользователь прочитал пост.
            Присутствует только в объектах списка `readers`.
    PostReadersResult:
      type: object
      properties:
        post_id:
          type: string
          description: ID поста
        read_count:
          type: integer
          format: int64
          description: Количество пользователей, прочитавших пост
        total_count:
          type: integer
          format: int64
          description: >
            Общее количество пользователей, для которых отслеживается прочтение.
            В малом канале — все участники кроме автора. В большом канале без
            личных упоминаний — все участники кроме автора. В большом канале с
            личными упоминаниями — число упомянутых пользователей.
        readers:
          type: array
          description: >
            Список пользователей, прочитавших пост. Пуст для большого канала без
            личных упоминаний или с ≥ 100 личными упоминаниями.
          items:
            $ref: "#/components/schemas/PostReaderEntry"
        non_readers:
          type: array
          description: >
            Список пользователей, не прочитавших пост. Пуст для большого канала
            без личных упоминаний или с ≥ 100 личными упоминаниями.
          items:
            $ref: "#/components/schemas/PostReaderEntry"
    PostsReadersResponse:
      type: object
      properties:
        results:
          type: array
          description: Результаты по каждому запрошенному посту, для которого пользователь
            является автором.
          items:
            $ref: "#/components/schemas/PostReadersResult"
    PostsStatusRequest:
      type: object
      properties:
        post_ids:
          type: array
          items:
            type: string
    PostsStatusResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              post_id:
                type: string
              is_read:
                type: boolean
    FileSearchParameters:
      type: object
      required:
        - terms
        - filters
        - extended_params
      properties:
        terms:
          $ref: "#/components/schemas/FileSearchTerms"
        filters:
          $ref: "#/components/schemas/FileSearchFilters"
        extended_params:
          $ref: "#/components/schemas/FileExtendedSearchParameters"
    FileSearchTerms:
      type: object
      required:
        - terms
      properties:
        terms:
          type: string
          description: >
            Поисковые термины, введённые пользователем.

            Для совместимости с files/search (v1), фильтры и excluded_terms
            можно передать в качестве строки.

            В связи с этим Поддерживаются специальные префиксы, как например:

            * `from:username` – искать файлы от пользователя.

            * `in:channelname` – искать в конкретном канале (по имени канала,
            **не** display‑name).

            * `ext:extension` – фильтрация по расширению.
        excluded_terms:
          type: string
          description: |
            Термины, которые **должны быть исключены** из результата.
            Работает аналогично `terms`, но со знаком `-` перед каждым словом.
    FileSearchFilters:
      type: object
      description: |
        Фильтры, которые применяются к поисковому запросу.
        Все поля являются необязательными; если массив пустой – соответствующий
        фильтр не применяется.
      properties:
        in_channels:
          $ref: "#/components/schemas/StringArray"
          description: Каналы, в которых искать файлы.
        excluded_channels:
          $ref: "#/components/schemas/StringArray"
          description: Каналы, из которых исключить файлы.
        from_users:
          $ref: "#/components/schemas/StringArray"
          description: Пользователи, в чьих файлах будет производиться поиск.
        excluded_users:
          $ref: "#/components/schemas/StringArray"
          description: Пользователи, файлы которых исключаются.
        after_date:
          type: string
          format: date
          description: |
            Файлы, созданные **после** указанной даты (включительно).
            Формат `YYYY‑MM‑DD`.
        excluded_after_date:
          type: string
          format: date
          description: |
            Исключить файлы, созданные после этой даты.
        before_date:
          type: string
          format: date
          description: |
            Файлы, созданные **до** указанной даты (включительно).
        excluded_before_date:
          type: string
          format: date
          description: |
            Исключить файлы, созданные до этой даты.
        on_date:
          type: string
          format: date
          description: |
            Точный день, в который были созданы файлы.
        excluded_date:
          type: string
          format: date
          description: |
            Исключить файлы, созданные в указанный день.
        extensions:
          $ref: "#/components/schemas/StringArray"
          description: Список разрешённых расширений (например `["png","pdf"]`).
        excluded_extensions:
          $ref: "#/components/schemas/StringArray"
          description: Расширения, которые нужно исключить.
        include_deleted_channels:
          type: boolean
          description: |
            Если `true`, то в поиск будут включены удалённые (архивные) каналы.
    FileExtendedSearchParameters:
      type: object
      description: Параметры, влияющие на работу ElasticSearch‑запроса.
      properties:
        is_or_search:
          type: boolean
          description: |
            `true` – запрос «OR», `false` – запрос «AND» (по умолчанию `false`).
        time_zone_offset:
          type: integer
          description: |
            Смещение от UTC часового пояса пользователя для поиска по датам.
          default: 0
        sort_by:
          $ref: "#/components/schemas/SortOption"
          description: |
            Сортировка результатов. Возможные варианты:
            * `ScoreDesc` – по релевантности (по умолчанию)
            * `CreateDesc` – по убыванию времени создания
            * `CreateAsc` – по возрастанию времени создания
        size:
          type: integer
          description: Количество результатов на странице.
          default: 60
        offset:
          type: integer
          description: Номер первой записи в текущей странице (аналог `page*size`).
          default: 0
    StringArray:
      type: array
      items:
        type: string
      description: Массив строк.
    SortOption:
      type: string
      enum:
        - ScoreDesc
        - CreateDesc
        - CreateAsc
      description: |
        Параметр сортировки.
        `ScoreDesc` – по релевантности,
        `CreateDesc` – от новых к старым,
        `CreateAsc` – от старых к новым.
    FileSearchResults:
      type: object
      description: >
        Структура ответа, содержащая результаты поиска файлов.

        Включает список файлов для текущей страницы и общее количество найденных
        элементов.
      properties:
        files:
          type: array
          description: Список объектов с информацией о найденных файлах.
          items:
            $ref: "#/components/schemas/FileInfo"
        total:
          type: integer
          description: |
            Общее количество файлов, удовлетворяющих условиям поиска.
            Используется для расчета пагинации на клиенте.
    PostSearchResultsV2:
      type: object
      description: >
        Структура ответа, содержащая результаты поиска постов.

        Включает список найденных постов с совпадениями и подсветкой, а также
        общее количество найденных элементов.
      properties:
        posts:
          type: array
          description: Список объектов с информацией о найденных постах, включая
            совпадения и подсветку.
          items:
            type: object
            description: Объект результата поиска поста с данными о совпадениях.
            properties:
              post:
                $ref: "#/components/schemas/Post"
                description: Объект найденного поста.
              match:
                type: array
                description: >
                  Массив строк, содержащих поля поста, в которых найдены
                  совпадения с поисковым запросом.

                  Например, может содержать фрагменты поля message.
                items:
                  type: string
              highlight:
                type: array
                description: |
                  Массив строк с подсвеченными фрагментами текста поста.
                  Содержит текст с разметкой для выделения найденных терминов.
                items:
                  type: string
        total:
          type: integer
          description: |
            Общее количество постов, удовлетворяющих условиям поиска в индексе.
            Используется для расчета пагинации на клиенте.
    PostSearchParameters:
      type: object
      description: >
        Параметры поиска постов.

        Включает поисковые термины, фильтры и расширенные параметры для
        выполнения поиска.
      properties:
        terms:
          $ref: "#/components/schemas/PostSearchTerms"
          description: Объект, содержащий поисковые термины и хэштеги.
        filters:
          $ref: "#/components/schemas/PostSearchFilters"
          description: Объект, содержащий фильтры для уточнения поиска.
        extended_params:
          $ref: "#/components/schemas/PostExtendedSearchParameters"
          description: Объект, содержащий расширенные параметры поиска (пагинация,
            сортировка).
    PostSearchTerms:
      type: object
      description: |
        Поисковые термины и хэштеги для поиска постов.
        Поддерживает включение и исключение терминов.
      properties:
        terms:
          type: string
          description: |
            Основные поисковые термины для поиска в содержимом постов.
            Может содержать несколько слов, разделённых пробелами.
        excluded_terms:
          type: string
          description: |
            Термины, которые должны быть исключены из результатов поиска.
            Посты, содержащие эти термины, не будут возвращены.
        hashtags:
          type: string
          description: |
            Хэштеги для поиска в постах.
            Может содержать несколько хэштегов.
        excluded_hashtags:
          type: string
          description: |
            Хэштеги, которые должны быть исключены из результатов поиска.
            Посты с этими хэштегами не будут возвращены.
    PostSearchFilters:
      type: object
      description: |
        Фильтры для уточнения поиска постов.
        Позволяет ограничить результаты по каналам, пользователям и датам.
      properties:
        in_channels:
          type: array
          description: Список ID каналов, в которых следует искать посты.
          items:
            type: string
        excluded_channels:
          type: array
          description: Список ID каналов, которые следует исключить из поиска.
          items:
            type: string
        from_users:
          type: array
          description: Список ID пользователей, чьи посты следует найти.
          items:
            type: string
        excluded_users:
          type: array
          description: Список ID пользователей, чьи посты следует исключить из поиска.
          items:
            type: string
        after_date:
          type: string
          description: |
            Дата в формате YYYY-MM-DD.
            Возвращает посты, созданные после указанной даты.
        excluded_after_date:
          type: string
          description: |
            Дата в формате YYYY-MM-DD.
            Исключает посты, созданные после указанной даты.
        before_date:
          type: string
          description: |
            Дата в формате YYYY-MM-DD.
            Возвращает посты, созданные до указанной даты.
        excluded_before_date:
          type: string
          description: |
            Дата в формате YYYY-MM-DD.
            Исключает посты, созданные до указанной даты.
        on_date:
          type: string
          description: |
            Дата в формате YYYY-MM-DD.
            Возвращает посты, созданные в указанную дату.
        excluded_date:
          type: string
          description: |
            Дата в формате YYYY-MM-DD.
            Исключает посты, созданные в указанную дату.
        include_deleted_channels:
          type: boolean
          description: |
            Флаг, указывающий, следует ли включать удалённые каналы в поиск.
            По умолчанию false.
    PostExtendedSearchParameters:
      type: object
      description: |
        Расширенные параметры поиска постов.
        Управляют пагинацией, логикой поиска и часовым поясом.
      properties:
        is_or_search:
          type: boolean
          description: |
            Флаг, указывающий, использовать ли логику OR для поисковых терминов.
            Если true, возвращаются посты, содержащие хотя бы один из терминов.
            Если false (по умолчанию), используются все термины (логика AND).
        time_zone_offset:
          type: integer
          description: |
            Смещение часового пояса.
            Используется для корректного преобразования дат в фильтрах.
        size:
          type: integer
          description: |
            Количество результатов на странице.
            По умолчанию 20.
        offset:
          type: integer
          description: |
            Смещение для пагинации (количество пропускаемых результатов).
            По умолчанию 0.
    Workflow:
      type: object
      required:
        - author
        - channel_id
        - steps
        - title
        - trigger
        - type
        - id
      properties:
        author:
          type: string
        channel_id:
          type: string
        description:
          type: string
        steps:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowStep"
        title:
          type: string
        trigger:
          type: string
          enum:
            - time
            - manual
            - userJoinedChannel
            - reaction
          x-enum-varnames:
