  /api/v4/system/ping:
    get:
      tags:
        - System
      summary: Проверка состояния системы
      description: >
        Проверка, работает ли сервер и находится ли он в хорошем состоянии.


        Сервер считается нездоровым (статус = UNHEALTHY) если:

        - Не удается определить hostname

        - Хост находится в feature flag `MaintenanceMode`

        - Количество горутин превышает порог `GoroutineHealthThreshold`

        - Возникают проблемы при работе с репликами БД (только если НЕ передан
        параметр `get_server_status`)


        Ответ содержит:

        - `status` - общее состояние сервера

        - Поддерживаемые версии мобильных клиентов (AndroidLatestVersion,
        AndroidMinVersion, IosLatestVersion, IosMinVersion)

        - `TestFeatureFlag` - значение из конфигурации
        `FeatureFlags.TestFeature` (если оно установлено и не равно "off")


        При передаче параметра `get_server_status`:

        - Проверяется состояние базы данных и её способность выполнять операции
        (результат возвращается как `database_status`)

        - Проверяется подключение к файловому хранилищу (результат возвращается
        как `filestore_status`)

        - Все три статуса добавляются в заголовки ответа

        - Проверка реплик БД пропускается


        ##### Разрешения

        Не требуется.
      operationId: GetPing
      parameters:
        - name: get_server_status
          in: query
          description: >
            При передаче этого параметра (любое значение) дополнительно
            проверяются статусы базы данных и файлового хранилища.
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Статус системы
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatusResponse"
        "500":
          description: Статус системы
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatusResponse"
