security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Token
  responses:
    Forbidden:
      description: Нет соответствующих разрешений
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
    Unauthorized:
      description: Токен доступа не предоставлен
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
    BadRequest:
      description: Неверные или отсутствующие параметры в URL или теле запроса
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
    TooLarge:
      description: Содержимое слишком большое
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
    NotImplemented:
      description: Функция отключена
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
    TooManyRequests:
      description: Слишком много запросов
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
    InternalServerError:
      description: Что-то пошло не так с сервером
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppError"
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        create_at:
          description: Время в миллисекундах, когда пользователь был создан
          type: integer
          format: int64
        update_at:
          description: Время в миллисекундах, когда пользователь был в последний раз
            обновлён
          type: integer
          format: int64
        delete_at:
          description: Время в миллисекундах, когда пользователь был удалён
          type: integer
          format: int64
        username:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        nickname:
          type: string
        email:
          type: string
        phone:
          type: string
        email_verified:
          type: boolean
        auth_service:
          type: string
        roles:
          type: string
        locale:
          type: string
        notify_props:
          $ref: "#/components/schemas/UserNotifyProps"
        props:
          $ref: "#/components/schemas/UserProps"
        last_password_update:
          type: integer
          format: int64
        last_picture_update:
          type: integer
          format: int64
        failed_attempts:
          type: integer
        mfa_active:
          type: boolean
