          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: >
                    Уникальный идентификатор для канала, будет присутствовать в
                    URL канала
                display_name:
                  type: string
                  description: Неуникальное имя для отображения канала в UI
                purpose:
                  type: string
                  description: Краткое описание цели канала
                header:
