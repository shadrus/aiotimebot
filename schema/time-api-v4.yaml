servers:
  - url: ""
paths:
  /api/v4/teams/{team_id}/top/reactions:
    get:
      tags:
        - Insights
      summary: Получить список лучших реакций для команды.
      description: |
        Получить список лучших реакций во всех публичных и приватных каналах
        (в которых пользователь является участником) для данной команды.

        ##### Разрешения
        Должно быть разрешение `view_team` для команды.
      operationId: GetTopReactionsForTeam
      parameters:
        - name: team_id
          in: path
          description: GUID команды
          required: true
          schema:
            type: string
        - name: time_range
          in: query
          description: |
            Временной диапазон может быть "today", "7_day" или "28_day".
            - `today`: реакции, опубликованные в текущий день.
            - `7_day`: реакции, опубликованные за последние 7 дней.
            - `28_day`: реакции, опубликованные за последние 28 дней.
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: Выбранная страница.
          schema:
            type: integer
            default: 0
        - name: per_page
          in: query
          description: Количество элементов на странице, максимум 200.
          schema:
            type: integer
            default: 60
      responses:
        "200":
          description: Успешное получение лучших реакций.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopReactionList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v4/users/me/top/reactions:
    get:
      tags:
        - Insights
      summary: Получить список лучших реакций для пользователя.
      description: |
        Получить список лучших реакций во всех публичных и приватных каналах
        (в которых пользователь является участником) для данного пользователя.
        Если `team_id` не предоставлен, это также будет включать реакции,
        опубликованные данным пользователем в личных и групповых сообщениях.

        ##### Разрешения
        Должен быть выполнен вход как пользователь.
      operationId: GetTopReactionsForUser
      parameters:
        - name: user_id
          in: path
          description: GUID пользователя
          required: true
          schema:
            type: string
        - name: time_range
          in: query
          description: |
            Временной диапазон может быть "today", "7_day" или "28_day".
            - `today`: реакции, опубликованные в текущий день.
            - `7_day`: реакции, опубликованные за последние 7 дней.
            - `28_day`: реакции, опубликованные за последние 28 дней.
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: Выбранная страница.
          schema:
            type: integer
            default: 0
        - name: per_page
          in: query
          description: Количество элементов на странице, максимум 200.
          schema:
            type: integer
            default: 60
        - name: team_id
          in: query
          description: >
            ID команды ограничит ответ для данной команды и исключит личные и
            групповые сообщения.

            ##### Разрешения

            Должно быть разрешение `view_team` для команды.
          schema:
            type: string
      responses:
        "200":
          description: Успешное получение лучших реакций.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopReactionList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v4/teams/{team_id}/top/channels:
    get:
      tags:
        - Insights
      summary: Получить список лучших каналов для команды.
      description: >
        Получить список лучших публичных и приватных каналов (в которых
        пользователь является участником) для данной команды.


        ##### Разрешения

        Должно быть разрешение `view_team` для команды.
      operationId: GetTopChannelsForTeam
      parameters:
        - name: team_id
          in: path
          description: GUID команды
          required: true
          schema:
            type: string
        - name: time_range
          in: query
          description: |
            Временной диапазон может быть "today", "7_day" или "28_day".
            - `today`: каналы с постами в текущий день.
            - `7_day`: каналы с постами за последние 7 дней.
            - `28_day`: каналы с постами за последние 28 дней.
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: Выбранная страница.
          schema:
            type: integer
            default: 0
        - name: per_page
          in: query
          description: Количество элементов на странице, максимум 200.
          schema:
            type: integer
            default: 60
      responses:
        "200":
          description: Успешное получение лучших каналов.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopChannelList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v4/users/me/top/channels:
    get:
      tags:
        - Insights
      summary: Получить список лучших каналов для пользователя.
      description: >
        Получить список лучших публичных и приватных каналов (в которых
        пользователь является участником) для данного пользователя.


        ##### Разрешения

        Должен быть выполнен вход как пользователь.
      operationId: GetTopChannelsForUser
      parameters:
        - name: user_id
          in: path
          description: GUID пользователя
          required: true
          schema:
            type: string
        - name: time_range
          in: query
          description: |
            Временной диапазон может быть "today", "7_day" или "28_day".
            - `today`: каналы с постами в текущий день.
            - `7_day`: каналы с постами за последние 7 дней.
            - `28_day`: каналы с постами за последние 28 дней.
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: Выбранная страница.
          schema:
            type: integer
            default: 0
        - name: per_page
          in: query
          description: Количество элементов на странице, максимум 200.
          schema:
            type: integer
            default: 60
        - name: team_id
          in: query
          description: |
            ID команды ограничит ответ для данной команды.
            ##### Разрешения
            Должно быть разрешение `view_team` для команды.
          schema:
            type: string
      responses:
        "200":
          description: Успешное получение лучших реакций.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopReactionList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v4/users/signup:
    post:
      tags:
        - Users
      summary: Создать пользователя
      description: |
        Создать нового пользователя в системе по приглашению.
      operationId: CreateUserSignup
      parameters:
        - name: t
          in: query
          description: ID токена из приглашения по электронной почте
          required: true
          schema:
            type: string
        - name: verification_token
          in: query
          description: >
            Токен для проверки номера телефона. Требуется, если включена
            проверка телефона.
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - login
                - password
                - phone
                - first_name
                - last_name
              properties:
                login:
                  type: string
                password:
                  description: Пароль, используемый для аутентификации по электронной почте.
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                phone:
                  type: string
                  description: >
                    Номер телефона в формате E164 с префиксом `+`,
                    https://wikipedia.org/wiki/E.164
                position:
                  description: Должность пользователя.
                  type: string
                image:
                  description: >
                    ID временного файла, загруженного через отдельный HTTP POST
                    эндпоинт /api/v4/files/{source}/{source_id}
                  type: string
        description: Объект формы регистрации пользователя
        required: true
      responses:
        "201":
          description: Регистрация пользователя успешна
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v4/users/login:
    post:
      tags:
        - Users
      summary: Вход на сервер Time
      description: |
        ##### Разрешения
        Разрешения не требуются
      operationId: Login
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                login_id:
                  type: string
                token:
                  type: string
                device_id:
                  type: string
                ldap_only:
                  type: boolean
                password:
                  description: Пароль, используемый для аутентификации по электронной почте.
                  type: string
        description: Объект аутентификации пользователя
        required: true
      responses:
        "201":
          description: Вход пользователя успешен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        "501":
          $ref: "#/components/responses/NotImplemented"
  /api/v4/users/login/cws:
    post:
      tags:
        - Users
      summary: Автовход на сервер Time с использованием токена CWS
      description: >
        CWS означает Customer Web Server, который является облачным сервисом,
        используемым для управления облачными инстансами.

        ##### Разрешения

        Требуется облачная лицензия
      operationId: LoginByCwsToken
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                login_id:
                  type: string
                cws_token:
                  type: string
        description: Объект аутентификации пользователя
        required: true
      responses:
        "302":
          description: >
            Вход успешен, будет перенаправлено на страницу входа для выполнения
            автологина
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v4/users/logout:
    post:
      tags:
        - Users
      summary: Выход с сервера Time
      description: |
        ##### Разрешения
        Требуется активная сессия
      operationId: Logout
      responses:
        "201":
          description: Выход пользователя успешен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v4/users:
    post:
      tags:
        - Users
      summary: Создать пользователя
      description: >
        Создать нового пользователя в системе. Пароль требуется для входа по
        электронной почте. Для других типов аутентификации, таких как LDAP или
        SAML, требуются поля auth_data и auth_service.

        ##### Разрешения

        Разрешения не требуются для создания учетных записей по электронной
        почте/имени пользователя на открытом сервере. Токен аутентификации
        требуется для других типов аутентификации, таких как LDAP или SAML.
      operationId: CreateUser
      parameters:
        - name: t
          in: query
          description: ID токена из приглашения по электронной почте
          required: false
          schema:
            type: string
        - name: iid
          in: query
          description: ID токена из ссылки приглашения
          required: false
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - username
              properties:
                email:
                  type: string
                username:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                nickname:
                  type: string
                auth_data:
                  description: >
                    Специфичные для сервиса данные аутентификации, такие как
                    адрес электронной почты. Если запрос не от системного
                    администратора, то значение сбрасывается в пустую строку.
                  type: string
                auth_service:
                  description: >
                    Сервис аутентификации, один из "email", "ldap", "saml" и "".
                    Если запрос не от системного администратора, то значение
                    сбрасывается в пустую строку.
                  type: string
                email_verified:
                  description: >
                    Отметка о том, что email пользователя подтверждён. Если
                    запрос не от системного администратора, то значение
                    сбрасывается в "false".
                  type: boolean
                password:
                  description: Пароль, используемый для аутентификации по электронной почте.
                  type: string
                locale:
                  type: string
                phone:
                  type: string
                position:
                  type: string
                timezone:
                  $ref: "#/components/schemas/Timezone"
                allow_marketing:
                  description: Согласие пользователя на получение маркетинговых рассылок.
                  type: boolean
                disable_welcome_email:
                  description: >
                    Если "true", приветственное письмо не будет отправлено
                    пользователю после создания учётной записи.
                  type: boolean
                props:
                  type: object
                notify_props:
                  $ref: "#/components/schemas/UserNotifyProps"
        description: Объект пользователя для создания
        required: true
      responses:
        "201":
          description: Создание пользователя успешно
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
    get:
      tags:
        - Users
      summary: Получить пользователей
      description: >
        Получить страницу со списком пользователей. На основе параметров строки
        запроса выберите пользователей из команды, канала или выберите
        пользователей, не входящих в конкретный канал.

        Начиная с версии сервера 4.0, доступна базовая сортировка с
        использованием параметра запроса `sort`. В настоящее время сортировка
        поддерживается только при выборе пользователей в команде.

        ##### Разрешения

        Требуется активная сессия и (если указано) членство в канале или
        команде, из которых производится выборка.

        Должен иметь роль `system_admin`, чтобы вызвать маршрут без параметров:
        in_team, not_in_team, in_channel, not_in_channel, in_group,
        not_in_group, without_team.
      operationId: GetUsers
      parameters:
        - name: page
          in: query
          description: Выбранная страница.
          schema:
            type: integer
            default: 0
        - name: per_page
          in: query
          description: >
            Количество пользователей на странице. Максимальное ограничение - 200
            пользователей на страницу.
          schema:
            type: integer
            default: 60
        - name: in_team
          in: query
          description: ID команды для получения пользователей.
          schema:
            type: string
        - name: not_in_team
          in: query
          description: >
            ID команды для исключения пользователей. Не должно использоваться с
            параметром запроса "in_team".
          schema:
            type: string
        - name: in_channel
          in: query
          description: ID канала для получения пользователей.
          schema:
            type: string
        - name: not_in_channel
          in: query
          description: >
            ID канала для исключения пользователей. Должно использоваться с
            параметром запроса "in_channel".
          schema:
            type: string
        - name: in_group
          in: query
          description: >
            ID группы для получения пользователей. Должен иметь разрешение
            `manage_system`.
          schema:
            type: string
        - name: group_constrained
          in: query
          description: >
            При использовании с `not_in_channel` или `not_in_team` возвращает
            только пользователей, которым разрешено присоединяться к каналу или
            команде на основе их ограничений группы.
          schema:
            type: boolean
        - name: without_team
          in: query
          description: >
            Указывает, следует ли перечислять пользователей, которые не входят в
            какую-либо команду. Этот параметр имеет приоритет над `in_team`,
            `in_channel` и `not_in_channel`.
          schema:
            type: boolean
        - name: active
          in: query
          description: >
            Указывает, следует ли перечислять только активных пользователей.
            Этот параметр не может использоваться вместе с параметром
            `inactive`.
          schema:
            type: boolean
        - name: inactive
          in: query
          description: >
            Указывает, следует ли перечислять только деактивированных
            пользователей. Этот параметр не может использоваться вместе с
            параметром `active`.
          schema:
            type: boolean
        - name: role
          in: query
          description: Возвращает пользователей, имеющих эту роль.
          schema:
            type: string
        - name: sort
          in: query
          description: >
            Сортировка доступна только в сочетании с определенными параметрами
            ниже. Параметр пагинации также всегда доступен.

            ##### `in_team`

            Может быть "", "last_activity_at" или "create_at".

            Если оставить пустым, сортировка выполняется по имени пользователя.

            __Минимальная версия сервера__: 4.0

            ##### `in_channel`

            Может быть "", "status".

            Если оставить пустым, сортировка выполняется по имени пользователя.
            `status` будет сортировать по текущему статусу пользователя (В сети,
            Нет на месте, Не беспокоить, Оффлайн), затем по имени пользователя.

            __Минимальная версия сервера__: 4.7
          schema:
            type: string
        - name: roles
          in: query
          description: >
            Строка, разделенная запятыми, используется для фильтрации
            пользователей на основе любой из указанных системных ролей

            Пример: `?roles=system_admin,system_user` вернет пользователей,
            которые являются либо системными администраторами, либо системными
            пользователями

