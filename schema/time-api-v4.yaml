  /api/v4/users/{user_id}/active:
    put:
      tags:
        - Users
      summary: Обновить активный статус пользователя
      description: >
        Обновите активный или неактивный статус пользователя.

        __С версии сервера 4.6 пользователи, использующие провайдера SSO для
        входа, могут быть активированы или деактивированы с помощью этой
        конечной точки. Однако, если их статус активации в Time не отражает их
        статус в провайдере SSO, следующая синхронизация или вход этого
        пользователя сбросит статус активации на статус их учетной записи в
        провайдере SSO. Версии сервера 4.5 и ранее не позволяют активацию или
        деактивацию пользователей SSO с этой конечной точки.__

        ##### Разрешения

        Пользователь может деактивировать себя.

        Пользователь с разрешением `manage_system` может активировать или
        деактивировать пользователя.
      operationId: UpdateUserActive
      parameters:
        - name: user_id
          in: path
          description: GUID пользователя
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - active
              properties:
                active:
                  type: boolean
        description: Используйте `true`, чтобы установить пользователя активным, `false`
          для неактивного
        required: true
      responses:
        "200":
          description: Успешное обновление активного статуса пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
