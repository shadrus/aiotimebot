  /api/v4/users/sessions/pwa:
    put:
      tags:
        - Users
      summary: Подписать PWA приложение на веб push-уведомления
      description: >
        Подписать PWA приложение на веб push-уведомления.

        Одна сессия может настроить либо веб push-уведомления через
        /users/sessions/pwa, либо уведомления мобильного приложения через
        /users/sessions/device. Последний вызов переопределит предыдущий.

        ##### Разрешения

        Должен быть аутентифицирован.
      operationId: SubscribeWebPush
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Обычно является результатом `JSON.stringify(PushSubscription)`
              required:
                - endpoint
                - keys
              properties:
                endpoint:
                  type: string
                  description: URL конечной точки push-уведомлений
                keys:
                  type: object
                  required:
                    - auth
                    - p256dh
                  properties:
                    auth:
                      type: string
                      description: Секрет аутентификации
                    p256dh:
                      type: string
                      description: Открытый ключ P-256 в режиме DH
        required: true
      responses:
        "200":
          description: Успешная подписка PWA
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
