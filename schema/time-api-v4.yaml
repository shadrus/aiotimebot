    delete:
      tags:
        - Channels
      summary: Удалить канал
      description: >
        Архивирует канал. Это установит `deleteAt` на текущее время в базе
        данных. Мягко удаленные каналы могут быть недоступны в пользовательском
        интерфейсе. Они могут быть просмотрены и восстановлены в **Консоль
        системы > Управление пользователями > Каналы** в зависимости от вашей
        лицензии. Каналы личных и групповых сообщений не могут быть удалены.

        Начиная с версии сервера 5.28, можно использовать параметр запроса
        `permanent=true` для окончательного удаления канала по причинам
        соответствия. Для использования этой функции
        `ServiceSettings.EnableAPIChannelDeletion` должен быть установлен в
        `true` в конфигурации сервера. Если вы окончательно удалите канал, это
        действие не может быть восстановлено за пределами резервной копии базы
        данных.

        ##### Разрешения

        Разрешение `delete_public_channel`, если канал является публичным,

        Разрешение `delete_private_channel`, если канал является приватным,

        или иметь разрешение `manage_system`.
      operationId: DeleteChannel
