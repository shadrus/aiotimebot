      description: >
        Обновите системные роли пользователя. Допустимые роли пользователя:
        `system_user`, `system_user system_admin`, `system_guest`,
        `system_restricted_guest` или `system_user` с другими пользовательскими
        системными ролями. Перезаписывает любые ранее назначенные системные
        роли.

        ##### Разрешения

        Должен иметь разрешение `manage_roles`, чтобы установить пользователя
        или системного администратора. Должен иметь разрешение `promote_guest`,
        чтобы повысить гостя до пользователя или повысить ограниченного гостя до
        гостя. Должен иметь разрешение `demote_to_guest`, чтобы понизить
        пользователя до гостя или ограниченного гостя, или понизить до
        ограниченного гостя.
      operationId: UpdateUserRoles
      parameters:
        - name: user_id
          in: path
          description: GUID пользователя
          required: true
          schema:
            type: string
