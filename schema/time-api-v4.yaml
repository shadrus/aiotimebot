  /api/v4/teams/{team_id}/files/search:
    post:
      tags:
        - Teams
        - Files
        - ElasticSearch
      summary: Поиск файлов в команде
      description: >
        Поиск файлов в команде на основе имени файла, расширения и содержимого
        файла (если извлечение содержимого файла включено и поддерживается для
        файлов).

        __Минимальная версия сервера__: 5.34

        ##### Разрешения

        Должен быть аутентифицирован и иметь разрешение `view_team`.
      operationId: SearchFiles
      parameters:
        - name: team_id
          in: path
          description: GUID команды
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - terms
              properties:
                terms:
                  type: string
                  description: >
                    Поисковые термины, введенные пользователем. Чтобы искать
                    файлы от пользователя, включите `from:someusername`,
                    используя имя пользователя. Чтобы искать в конкретном
                    канале, включите `in:somechannel`, используя имя канала (не
                    отображаемое имя). Чтобы искать по конкретным расширениям,
                    включите `ext:extension`.
                is_or_search:
                  type: boolean
                  description: >
                    Установите значение true, если должен быть выполнен поиск
                    "Или" вместо поиска "И".
                time_zone_offset:
                  type: integer
                  default: 0
                  description: >
                    Смещение от UTC часового пояса пользователя для поиска по
                    датам.
                sort_by:
                  type: string
                  default: ScoreDesc
                  description: >
                    Сортировка результатов поиска по определенному критерию.
                    Варианты: 
                      - По релевантности `ScoreDesc` (по умолчанию)
                      - По убыванию времени создания `CreateDesc`
                      - По возрастанию времени создания `CreateAsc`
                include_deleted_channels:
                  type: boolean
                  description: >
                    Установите значение true, если удаленные каналы должны быть
                    включены в поиск. (архивированные каналы)
                page:
                  type: integer
                  default: 0
                  description: |
                    Выбранная страница. (Работает только с Elasticsearch)
                per_page:
                  type: integer
                  default: 60
                  description: >
                    Количество сообщений на странице. (Работает только с
                    Elasticsearch)
        description: Поисковые термины и логика, используемая в поиске.
        required: true
      responses:
        "200":
          description: Список файлов успешно получен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileInfoList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-codeSamples:
        - lang: curl
          source: >
            curl -X POST \
              https://time-url.domain/api/v4/teams/zWEyrTZ7GZ22aBSfoX60iWryTY/files/search \
              -H 'Authorization: Bearer frn8fu5rtpyc5m4xy6q3oj4yur' \
              -H 'Content-Type: application/json' \
              -d '{"terms": "filename", "is_or_search": false}'
  /api/v4/teams/{team_id}/files/search/v2:
    post:
      tags:
        - Teams
        - Files
        - ElasticSearch
      summary: Поиск файлов в команде (v2)
      description: >
        Поиск файлов в команде на основе имени файла, расширения и содержимого
        файла

        (если извлечение содержимого файла включено и поддерживается для
        файлов).


        ##### Разрешения  

        Пользователь должен быть аутентифицирован и иметь право `view_team`.  


        **Отличие от v1** – тело запроса теперь представляет собой структуру

        `FileSearchParameters`, которая объединяет термы, фильтры и параметры

        расширенного поиска в три логически отдельные секции. Тело ответа
        представляет собой

        структуру `FileSearchResults`, которая представляет собой список
        найденных файлов

        и общее количество файлов, подходящих под параметры поиска. Количество
        элементов в 

        выходном списке ограничивается параметром `Extended_Params.Size`.


        **Поддерживается логика v1 с тем, что фильтры могут быть написаны в
        terms**
      operationId: SearchFilesV2
      parameters:
        - name: team_id
          in: path
          description: GUID команды
          required: true
          schema:
            type: string
      requestBody:
        description: Параметры поиска, разбитые на три вложенных объекта.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileSearchParameters"
      responses:
        "200":
          description: Список файлов успешно получен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileSearchResults"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-codeSamples:
        - lang: curl
          source: >
            curl -X POST \
              https://time-url.domain/api/v4/teams/zWEyrTZ7GZ22aBSfoX60iWryTY/files/search/v2 \
              -H 'Authorization: Bearer <TOKEN>' \
              -H 'Content-Type: application/json' \
              -d '{
                    "terms": { "terms": "filename", "excluded_terms": "oldfile" },
                    "filters": {
                      "in_channels": ["general","random"],
                      "excluded_channels": ["archived"],
                      "from_users": ["john.doe"],
                      "after_date": "2024-01-01",
                      "extensions": ["png","jpg"]
                    },
                    "extended_params": {
                      "is_or_search": false,
                      "time_zone_offset": 0,
                      "sort_by": "ScoreDesc",
                      "size": 60,
                      "offset": 0
                    }
                  }'
