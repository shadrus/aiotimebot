  /api/v4/files:
    post:
      tags:
        - Files
      summary: Загрузить файл
      description: >
        Загружает файл, который позже может быть прикреплен к сообщению.

        Этот запрос может быть либо запросом multipart/form-data с channel_id,
        файлами и необязательными client_ids, определенными в FormData, либо это
        может быть запрос с channel_id и именем файла, определенными как
        параметры запроса с содержимым одного файла в теле запроса.

        Только запросы multipart/form-data поддерживаются серверными версиями до
        и включая 4.7.

        Серверные версии 4.8 и выше поддерживают оба типа запросов.

        Этот ответ может вернуть 400 Bad Request, если файл не прошел проверку
        ICAP серверов.

        ##### Разрешения

        Необходимо иметь разрешение `upload_file`.
      operationId: UploadFile
      parameters:
        - name: channel_id
          in: query
          description: |
            Идентификатор канала, в который будет загружен этот файл
          required: false
          schema:
            type: string
        - name: filename
          in: query
          description: Имя файла для загрузки
          required: false
          schema:
            type: string
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  description: Файл для загрузки
                  type: string
                  format: binary
                channel_id:
                  description: |
                    Идентификатор канала, в который будет загружен этот файл
                  type: string
                client_ids:
                  description: >
                    Уникальный идентификатор для файла, который будет возвращен
                    в ответе
                  type: string
      responses:
        "201":
          description: >
            Соответствующие списки предоставленных client_ids и метаданных,
            которые были сохранены в базе данных для каждого из них
          content:
            application/json:
              schema:
                type: object
                properties:
                  file_infos:
                    description: >
                      Список метаданных файла, которые были сохранены в базе
                      данных
                    type: array
                    items:
                      $ref: "#/components/schemas/FileInfo"
                  client_ids:
                    description: |
                      Список client_ids, которые были предоставлены в запросе
                    type: array
                    items:
                      type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/TooLarge"
        "501":
          $ref: "#/components/responses/NotImplemented"
      x-codeSamples:
        - lang: Curl
          source: |
            curl -F 'files=@PATH/TO/LOCAL/FILE' \
            -F 'channel_id=CHANNEL_ID' \
            --header 'authorization: Bearer c49adc55z3f53ck7xtp8ebq1ir'
            https://time-url.domain/api/v4/files
  /api/v4/files/{file_id}:
    get:
      tags:
        - Files
      summary: Получить файл
      description: |
        Получает файл, который был загружен ранее.
        ##### Разрешения
        Необходимо иметь разрешение `read_channel` или быть загрузчиком файла.
      operationId: GetFile
      parameters:
        - name: file_id
          in: path
          description: Идентификатор файла для получения
          required: true
          schema:
            type: string
      responses:
