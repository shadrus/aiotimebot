        предназначено для использования, когда атрибут id установлен в пустое
        значение из ранее непустого значения.

        __Минимальная версия сервера__: 5.35

        ##### Разрешения

        Необходимо иметь разрешение `manage_system`.
      operationId: ResetSamlAuthDataToEmail
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                include_deleted:
                  type: boolean
                  default: false
                  description: Включать ли удаленных пользователей.
                dry_run:
                  type: boolean
                  default: false
                  description: >
                    Если установлено в true, возвращается количество
                    пользователей, которые будут затронуты.
                user_ids:
                  type: array
                  items:
                    type: string
                  default: []
                  description: >
                    Если установлено в непустой массив, то пользователи, чьи
                    идентификаторы не находятся в массиве, будут исключены.
