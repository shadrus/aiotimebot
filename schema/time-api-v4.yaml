        данных. Мягко удаленные каналы могут быть недоступны в пользовательском
        интерфейсе. Они могут быть просмотрены и восстановлены в **Системной
        консоли > Управление пользователями > Каналы** в зависимости от вашей
        лицензии. Прямые и групповые каналы сообщений не могут быть удалены.

        ##### Разрешения

        Разрешение `delete_public_channel`, если канал публичный,

        разрешение `delete_private_channel`, если канал частный,

        или иметь разрешение `manage_system`.
