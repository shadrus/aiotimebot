      parameters:
        - name: policy_id
          in: path
          description: ID детализированной политики хранения данных.
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                term:
                  type: string
                  description: |
                    Строка для поиска в имени канала, отображаемом имени и цели.
