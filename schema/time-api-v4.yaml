    get:
      tags:
        - Threads
      summary: Получить все треды, которые пользователь отслеживает
      description: >
        Получить все треды, которые пользователь отслеживает


        __Минимальная версия сервера__: 5.29


        ##### Разрешения

        Необходимо быть авторизованным как пользователь или иметь разрешение
        `edit_other_users`.
      operationId: GetUserThreads
      parameters:
        - name: user_id
          in: path
          description: >
            ID пользователя. Это также может быть "me", что указывает на
            текущего пользователя.
          required: true
          schema:
            type: string
        - name: team_id
          in: path
          description: ID команды, в которой находится тред.
          required: true
          schema:
            type: string
        - name: pageSize
          in: query
          description: PageSize определяет размер возвращаемого блока результатов. По
            умолчанию = 30
          required: false
          schema:
            type: integer
            format: int64
        - name: extended
          in: query
          description: Extended добавит в ответ информацию об участниках. По умолчанию =
            false
          required: false
          schema:
            type: boolean
        - name: deleted
          in: query
          description: Deleted указывает, что также должны быть возвращены удалённые
            треды. По умолчанию = false
          required: false
          schema:
            type: boolean
        - name: since
          in: query
          description: Since фильтрует треды по их метке времени LastUpdateAt.
          required: false
          schema:
            type: integer
            format: int64
        - name: before
          in: query
          description: Before указывает ID треда как курсор для пагинации и возвращает
            PageSize тредов до этого курсора
          required: false
          schema:
            type: string
        - name: after
          in: query
          description: After указывает ID треда как курсор для пагинации и возвращает
            PageSize тредов после этого курсора
          required: false
          schema:
            type: string
        - name: unread
          in: query
          description: Unread обеспечивает возврат только тех тредов, в которых есть
            непрочитанные ответы
          required: false
          schema:
            type: boolean
        - name: skipTotal
          in: query
          description: SkipTotal не будет запрашивать общее количество тредов
          required: false
          schema:
            type: boolean
        - name: totalsOnly
          in: query
          description: TotalsOnly не будет запрашивать треды, а только общее количество
          required: false
          schema:
            type: boolean
        - name: threadsOnly
          in: query
          description: ThreadsOnly вернёт только треды без подсчёта общего количества
            (будет возвращено 0)
          required: false
          schema:
            type: boolean
        - name: teamOnly
          in: query
          description: TeamOnly вернёт треды и непрочитанные сообщения только для
            указанной команды, исключая ЛС и группы
          required: false
          schema:
            type: boolean
        - name: disable_channel_type_group
          in: query
          description: >
            Если установить true, то не будет возвращаться количество
            непрочитанных сообщений и упоминаний с группировкой по типам каналов
          required: false
          schema:
            type: boolean
