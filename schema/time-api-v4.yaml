    UserNotifyProps:
      type: object
      properties:
        email:
          type: string
          description: >
            Установите "true", чтобы включить уведомления по электронной почте,
            "false", чтобы отключить. По умолчанию "true".
        push:
          $ref: "#/components/schemas/UserMentionNotificationType"
          default: mention
          description: >
            Установите "all", чтобы получать push-уведомления обо всей
            активности, "mention" только для упоминаний и личных сообщений, и
            "none", чтобы отключить. По умолчанию "mention".
        desktop:
          $ref: "#/components/schemas/UserMentionNotificationType"
          default: mention
          description: >
            Установите "all", чтобы получать уведомления на рабочем столе обо
            всей активности, "mention" только для упоминаний и личных сообщений,
            и "none", чтобы отключить. По умолчанию "mention".
        desktop_sound:
          type: string
          description: >
            Установите "true", чтобы включить звук уведомлений на рабочем столе,
            "false", чтобы отключить. По умолчанию "true".
        mention_keys:
          type: string
          description: >
            Список слов, разделенных запятыми, которые считаются упоминаниями.
            По умолчанию имя пользователя и @имя_пользователя.
        channel:
          type: string
          description: >
            Установите "true", чтобы включить уведомления для всего канала
            (@channel, @all, и т.д.), "false", чтобы отключить. По умолчанию
            "true".
        first_name:
          type: string
          description: >
            Установите "true", чтобы включить упоминания по имени. По умолчанию
            "true", если имя установлено, "false" в противном случае.
        desktop_threads:
          $ref: "#/components/schemas/UserMentionNotificationType"
          default: all
          description: >
            Установите "all", чтобы получать уведомления на рабочем столе обо
            всей активности, "mention" только для упоминаний и личных сообщений,
            и "none", чтобы отключить. По умолчанию "all".
        push_threads:
          $ref: "#/components/schemas/UserMentionNotificationType"
          default: all
          description: >
            Установите "all", чтобы получать уведомления обо всей активности в
            теме, "mention" только для упоминаний и личных сообщений, и "none",
            чтобы отключить. По умолчанию "all".
        desktop_reactions:
          $ref: "#/components/schemas/UserReactionsNotificationType"
          default: none
          nullable: true
          description: >
            Установите "conversation", чтобы получать уведомления о реакциях в
            личных и групповых каналах, "direct" только для реакций в личных
            каналах, и "none", чтобы отключить. По умолчанию "none" или не
            существует.
        push_reactions:
          $ref: "#/components/schemas/UserReactionsNotificationType"
          default: none
          nullable: true
          description: >
            Установите "conversation", чтобы получать уведомления о реакциях в
            личных и групповых каналах, "direct" только для реакций в личных
            каналах, и "none", чтобы отключить. По умолчанию "none" или не
            существует.
    Timezone:
      type: object
      properties:
        useAutomaticTimezone:
          type: string
          description: >
            Установите "true", чтобы использовать часовой пояс браузера/системы,
            "false", чтобы установить вручную. По умолчанию "true".
        manualTimezone:
          type: string
          description: >
            Значение при ручной установке часового пояса, например,
            "Europe/Berlin".
        automaticTimezone:
          type: string
          description: >
            Это значение устанавливается автоматически, когда
            "useAutomaticTimezone" установлено в "true".
    ChannelNotifyProps:
      type: object
      properties:
        email:
          type: string
          description: >
            Установите "true", чтобы включить уведомления по электронной почте,
            "false", чтобы отключить, или "default", чтобы использовать
            глобальную настройку уведомлений пользователя.
        push:
          type: string
          description: >
            Установите "all", чтобы получать push-уведомления обо всей
            активности, "mention" только для упоминаний и личных сообщений,
            "none", чтобы отключить, или "default", чтобы использовать
            глобальную настройку уведомлений пользователя.
        desktop:
          type: string
          description: >
            Установите "all", чтобы получать уведомления на рабочем столе обо
            всей активности, "mention" только для упоминаний и личных сообщений,
            "none", чтобы отключить, или "default", чтобы использовать
            глобальную настройку уведомлений пользователя.
        mark_unread:
          type: string
          description: >
            Установите "all", чтобы отмечать канал как непрочитанный для любого
            нового сообщения, "mention" чтобы отмечать как непрочитанный только
            для новых упоминаний. По умолчанию "all".
        ignore_channel_mentions:
          type: string
          description: >
            Установите "on", чтобы включить уведомления для упоминаний, "off",
            чтобы выключить уведомления для упоминаний, или "default", чтобы
            использовать глобальную настройку уведомлений пользователя.
        push_threads:
          type: string
          description: >
            Установите "all", чтобы получать уведомления обо всех сообщениях в
            обсуждениях, сбросьте значение для отключения уведомлений, по
            умолчанию значение сброшено
    PluginManifest:
