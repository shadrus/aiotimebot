  /api/v4/teams/search:
    post:
      tags:
        - Teams
      summary: Поиск команд
      description: >
        Поиск команд на основе поискового термина и параметров, предоставленных
        в теле запроса.


        ##### Разрешения

        Вошедший в систему пользователь видит только открытые команды

        Вошедший в систему пользователь с разрешением "manage_system" видит все
        команды
      operationId: SearchTeams
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                term:
                  description: >
                    Поисковый термин для сопоставления с именем или отображаемым
                    именем команд
                  type: string
                page:
                  type: string
                  description: >
                    Номер страницы для возврата, если используется пагинация.
                    Если этот параметр отсутствует вместе с параметром
                    `per_page`, результаты будут возвращены без пагинации.
                per_page:
                  type: string
                  description: >
                    Количество записей для возврата на страницу, если
                    используется пагинация. Если этот параметр отсутствует
                    вместе с параметром `page`, результаты будут возвращены без
                    пагинации.
                allow_open_invite:
                  type: boolean
                  description: >
                    Фильтрует результаты для команд, где `allow_open_invite`
                    установлен в true или false, исключает каналы с
                    ограничениями группы, если этот параметр фильтрации передан.

                    Если этот параметр фильтрации не передан, запрос останется
                    неизменным.

                    __Минимальная версия сервера__: 5.28
                group_constrained:
                  type: boolean
                  description: >
                    Фильтрует результаты для команд, где `group_constrained`
                    установлен в true или false, возвращает объединение
                    результатов при использовании с `allow_open_invite`

                    Если параметр фильтрации не передан, запрос останется
                    неизменным.

                    __Минимальная версия сервера__: 5.28
                exclude_policy_constrained:
                  type: boolean
                  default: false
                  description: >
                    Если установлено значение true, будут возвращены только
                    команды, которым не назначена детализированная политика
                    хранения. Разрешение
                    `sysconsole_read_compliance_data_retention` требуется для
                    использования этого параметра.

                    __Минимальная версия сервера__: 5.35
        description: Критерии поиска
        required: true
      responses:
        "200":
          description: >
            Ответ с пагинацией команд. (Обратите внимание, что непагинированный
            ответ — возвращается, если тело запроса не содержит полей `page` и
            `per_page` — это простой массив команд.)
          content:
            application/json:
              schema:
                type: object
                properties:
                  teams:
                    type: array
                    description: Команды, соответствующие запросу.
                    items:
                      $ref: "#/components/schemas/Team"
                  total_count:
                    type: integer
                    description: >
                      Общее количество результатов, независимо от запрошенных
                      page и per_page.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
