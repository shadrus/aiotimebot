  /api/v4/applications/{application_id}/regen_token/{token_type}:
    post:
      tags:
        - Applications
      summary: Перегенерировать токен приложения
      description: |
        Перегенерировать токен бота или слеш-команды для указанного приложения.

        При регенерации токена бота:
        - Создаётся новый дефолтный токен доступа для бота
        - Другие токены бота (если есть) остаются без изменений

        При регенерации токена команды:
        - Обновляются токены во всех связанных слеш-командах

        ##### Разрешения
        Должно быть разрешение `create_applications`.
      operationId: RegenApplicationToken
      parameters:
        - name: application_id
          in: path
          description: ID приложения
          required: true
          schema:
            type: string
        - name: token_type
          in: path
          description: Тип токена для регенерации
          required: true
          schema:
            type: string
            enum:
              - bot
              - command
      responses:
        "200":
          description: Успешная регенерация токена
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      bot_token:
                        type: string
                        description: Новый токен бота
                    required:
                      - bot_token
                  - type: object
                    properties:
                      command_token:
                        type: string
                        description: Новый токен слеш-команды
                    required:
                      - command_token
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
