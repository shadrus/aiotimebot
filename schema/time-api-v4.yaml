  /api/v4/channels/search:
    post:
      tags:
        - Channels
      summary: Поиск всех приватных и открытых каналов во всех командах
      description: >
        Возвращает все приватные и открытые каналы, где 'term' совпадает с
        именем, отображаемым именем или целью канала.

        Каналы, связанные (через записи GroupChannel) с данной группой, могут
        быть исключены из результатов с помощью параметра
        `not_associated_to_group` и строки идентификатора группы.
      operationId: SearchAllChannels
      parameters:
        - name: system_console
          in: query
          description: >
            Является ли запрос из system_console. Если установлено значение
            true, фильтрует каналы по вошедшему в систему пользователю.
          required: false
          schema:
            type: boolean
            default: true
        - name: boost
          in: query
          description: >
            Если установлено значение true, каналы, посещенные пользователем,
            размещаются в начале [0; boost_limit) ответа поиска, а другие каналы
            размещаются в [boost_limit; search_limit). Сейчас boost_limit ==
            search_limit, мы пытаемся повысить все каналы, если можем.

            __Минимальная версия сервера__: 6.56
          required: false
          schema:
            type: boolean
            default: false
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - term
              properties:
                term:
                  type: string
                  description: |
                    Строка для поиска в имени канала, отображаемом имени и цели.
                not_associated_to_group:
                  type: string
                  description: >
                    Идентификатор группы для исключения каналов, связанных с
                    этой группой через записи GroupChannel.
                team_ids:
                  type: array
                  items:
                    type: string
                  description: >
                    Фильтрует результаты для каналов, принадлежащих указанным
                    идентификаторам команд.

                    __Минимальная версия сервера__: 5.26
                group_constrained:
                  type: boolean
                  description: >
                    Фильтрует результаты, чтобы возвращать только каналы,
                    ограниченные группой.

                    __Минимальная версия сервера__: 5.26
                exclude_group_constrained:
                  type: boolean
                  description: >
                    Фильтрует результаты, чтобы исключить каналы, ограниченные
                    группой.

                    __Минимальная версия сервера__: 5.26
                public:
                  type: boolean
                  description: >
                    Фильтрует результаты, чтобы возвращать только публичные /
                    открытые каналы, может использоваться вместе с `private` для
                    возврата как `public`, так и `private` каналов.

                    __Минимальная версия сервера__: 5.26
                private:
                  type: boolean
                  description: >
                    Фильтрует результаты, чтобы возвращать только приватные
                    каналы, может использоваться вместе с `public` для возврата
                    как `private`, так и `public` каналов.

                    __Минимальная версия сервера__: 5.26
                deleted:
                  type: boolean
                  description: >
                    Фильтрует результаты, чтобы возвращать только удаленные /
                    архивированные каналы.

                    __Минимальная версия сервера__: 5.26
                page:
                  type: string
                  description: >
                    Номер страницы для возврата, если используется пагинация.
                    Если этот параметр отсутствует вместе с параметром
                    `per_page`, то результаты будут возвращены без пагинации.
                per_page:
                  type: string
                  description: >
                    Количество записей для возврата на странице, если
                    используется пагинация. Если этот параметр отсутствует
                    вместе с параметром `page`, то результаты будут возвращены
                    без пагинации.
                exclude_policy_constrained:
                  type: boolean
                  default: false
                  description: >
                    Если установлено значение true, будут возвращены только
                    каналы, к которым не применена детализированная политика
                    хранения. Для использования этого параметра требуется
                    разрешение `sysconsole_read_compliance_data_retention`.

                    __Минимальная версия сервера__: 5.35
                include_search_by_id:
                  type: boolean
                  default: false
                  description: >
                    Если установлено значение true, возвращает каналы, где
                    указанный поисковый 'term' совпадает с идентификатором
                    канала.

                    __Минимальная версия сервера__: 5.35
        description: Поисковые термины и логика для использования в поиске.
        required: true
      responses:
        "200":
          description: Успешный поиск каналов (WithBoost)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelListWithTeamData"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
