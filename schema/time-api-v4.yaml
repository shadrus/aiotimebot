  /api/v4/users/{user_id}:
    get:
      tags:
        - Users
      summary: Получить пользователя
      description: |
        Получить объект пользователя. Конфиденциальная информация будет удалена.
        ##### Разрешения
        Требуется активная сессия, но не требуется других разрешений.
      operationId: GetUser
      parameters:
        - name: user_id
          in: path
          description: >
            GUID пользователя. Это также может быть "me", что указывает на
            текущего пользователя.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Успешное получение пользователя
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Users
      summary: Обновить пользователя
      description: >
        Обновите пользователя, предоставив объект пользователя. Поля, которые
        могут быть обновлены, определены в теле запроса, все другие
        предоставленные поля будут проигнорированы. Любые поля, не включенные в
        тело запроса, будут установлены в null или возвращены к значениям по
        умолчанию.

        ##### Разрешения

        Должен быть залогинен как пользователь, который обновляется, или иметь
        разрешение `edit_other_users`.
      operationId: UpdateUser
      parameters:
        - name: user_id
          in: path
          description: GUID пользователя
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - email
                - username
              properties:
                id:
