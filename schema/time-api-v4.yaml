        указанного в URL запроса.

        __Минимальная версия сервера__: 6.248.0

        ##### Разрешения

        Должен быть участником команды. Результаты поиска ограничены каналами и
        пользователями, к которым у пользователя есть доступ.
      operationId: MultiSearchUsersChannels
      parameters:
        - name: team_id
          in: query
          description: GUID команды
          required: true
          schema:
            type: string
        - name: term
          in: query
          description: Поисковый запрос
          required: true
          schema:
            type: string
        - name: channel_types
          in: query
          description: |
            Массив типов каналов.
            Тип канала - одно из возможных значений: 'G'-групповой канал,
            'P'-приватный канал, 'O'-открытый канал
          schema:
            type: array
            items:
              type: string
              enum:
                - P
                - O
                - G
        - name: archived_channels
          in: query
          description: >
            Если установлено в false, результат будет содержать только
            неархивированные каналы. Если не установлено, результат будет
            содержать архивированные и неархивированные каналы
          required: false
          schema:
            type: boolean
        - name: archived_users
          in: query
          description: >
            Если установлено в false, результат будет содержать только
            неархивированных пользователей. Если не установлено, результат будет
            содержать архивированных и неархивированных пользователей
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          description: Лимит элементов на странице.
          schema:
            type: integer
            default: 150
            maximum: 600
            minimum: 1
      responses:
        "200":
          description: Успешный множественный поиск
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BoostedUserOrChannel"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /api/v4/groups:
    get:
      tags:
        - Groups
      summary: Получить группы
      description: >
        Получить список всех групп, не связанных с определенным каналом или
        командой.

        `not_associated_to_team` **ИЛИ** `not_associated_to_channel`
        обязательно.

        Если вы используете `not_associated_to_team`, вы должны быть
        администратором команды для этой конкретной команды (разрешение на
        управление этой командой).

        Если вы используете `not_associated_to_channel`, вы должны быть
        администратором канала для этого конкретного канала (разрешение на
        управление этим каналом).

        __Минимальная версия сервера__: 5.11
      operationId: GetGroups
      parameters:
        - name: page
          in: query
          description: Выбранная страница.
          schema:
            type: integer
            default: 0
        - name: per_page
          in: query
          description: Количество групп на странице.
          schema:
            type: integer
            default: 60
        - name: q
          in: query
          description: >
            Строка для поиска по шаблону в полях `name` и `display_name`. Вернет
            все группы, у которых поля `name` и `display_name` соответствуют
            любому из текста.
          schema:
            type: string
        - name: include_member_count
          in: query
          description: >
            Логическое значение, которое добавляет атрибут `member_count` к
            каждому объекту JSON группы.
          schema:
            type: boolean
        - name: not_associated_to_team
          in: query
          description: >
            GUID команды, который используется для возврата всех групп, не
            связанных с этой командой.
          required: true
          schema:
            type: string
        - name: not_associated_to_channel
          in: query
          description: >
            GUID группы, который используется для возврата всех групп, не
            связанных с этим каналом.
          required: true
          schema:
            type: string
        - name: since
          in: query
          description: >
            Возвращать только группы, которые были изменены с указанного
            Unix-времени (в миллисекундах). Все измененные группы, включая
            удаленные и созданные, будут возвращены.

            __Минимальная версия сервера__: 5.24
          schema:
            type: integer
            format: int64
        - name: filter_allow_reference
          in: query
          description: >
            Логическое значение, которое фильтрует записи группы с установленным
            атрибутом `allow_reference`.
          schema:
            type: boolean
            default: false
        - name: archived
          in: query
          description: >
            Если установлено значение true, результат будет содержать только
            архивированные группы. Если установлено значение false, результат
            будет содержать только неархивированные группы. Если не установлено,
            результат будет содержать архивированные и неархивированные группы.
          schema:
            type: boolean
      responses:
        "200":
          description: Успешное получение списка групп
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Group"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          $ref: "#/components/responses/NotImplemented"
    post:
      tags:
        - Groups
      summary: Создать пользовательскую группу
      description: |
        Создать группу типа `custom`.

        #### Разрешение
        Должно быть разрешение `create_custom_group`.

        __Минимальная версия сервера__: 6.3
      operationId: CreateGroup
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - display_name
                - source
                - allow_reference
              description: Объект группы для создания.
              properties:
                name:
                  type: string
                  description: |
                    Уникальное имя группы, используемое для упоминания.
                display_name:
                  type: string
                  description: |
                    Отображаемое имя группы, которое может включать пробелы.
                source:
                  type: string
                  description: Должно быть `custom`
                allow_reference:
                  type: boolean
                  description: Должно быть true
                user_ids:
                  type: array
                  description: Идентификаторы пользователей, которых нужно добавить в группу.
                  items:
                    type: string
        description: Объект группы и начальные участники.
        required: true
      responses:
        "201":
          description: Успешное создание группы и добавление участников.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "501":
          description: |
            Группа имеет недопустимое значение `source`, или
            `allow_reference` не равно `true`, или
            группа имеет `remote_id`.
