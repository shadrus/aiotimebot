        При необходимости вы можете использовать параметр запроса
        `permanent=true`, чтобы **навсегда удалить** учетную запись пользователя
        по причинам соответствия. Чтобы включить постоянное удаление, параметр
        конфигурации `ServiceSettings.EnableAPIUserDeletion` должен быть
        установлен в `true`.

