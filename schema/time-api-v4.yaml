      summary: Миграция типа аутентификации учетных записей пользователей на OpenID.
      description: >
        Миграция учетных записей от одного провайдера аутентификации к другому.
        Например, вы можете обновить своего провайдера аутентификации с
        электронной почты на OpenID.

        ##### Разрешения

        Необходимо иметь разрешение `manage_system`.
      operationId: MigrateAuthToOpenID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - from
                - update_auth_data
                - dry_run
              properties:
                from:
                  description: >
                    Пользователи с текущим типом аутентификации будут
                    мигрированы.
                  type: string
                  enum:
                    - email
                    - gitlab
                    - saml
                    - ldap
                    - google
                update_auth_data:
                  description: Установить AuthData пользователя Time на его имя пользователя.
                  type: boolean
