  /api/v4/channels/{channel_id}/posts:
    get:
      tags:
        - Posts
      summary: Получить посты для канала
      description: >
        Получить страницу постов в канале. Используйте параметры запроса для
        изменения поведения этой конечной точки.

        ##### Параметры запроса

        - **`around`** — ID поста, вокруг которого нужно получить посты.
          Возвращает ~половину постов до и ~половину после указанного поста,
          включая сам целевой пост. Количество постов регулируется
          параметром `per_page`. Например, `per_page=60` вернёт ~30 постов до,
          целевой пост и ~29 постов после.

        - **`since`** — не должен использоваться с `around`, `before`, `after`,
          `page` и `per_page`. Возвращает все посты, изменённые после указанного
          времени (Unix timestamp в миллисекундах), упорядоченные по времени
          создания, ограниченные до 1000. Нет гарантии, что возвращённые посты
          будут последовательными.

        - **`before`** / **`after`** — ID поста для выбора постов до или после
          него. Не должны использоваться с `around`.

        ##### Разрешения

        Должно быть разрешение `read_channel` для канала.
      operationId: GetPostsForChannel
      parameters:
        - name: channel_id
          in: path
          description: ID канала для получения постов
          required: true
          schema:
            type: string
        - name: page
          in: query
          description: Выбранная страница
          schema:
            type: integer
            default: 0
        - name: per_page
          in: query
          description: Количество постов на странице
          schema:
            type: integer
            default: 60
        - name: since
          in: query
          description: >
            Укажите ненулевое значение в миллисекундах Unix времени для выбора
            постов, измененных после этого времени. Не должен использоваться с
            around, before, after
          schema:
            type: integer
            format: int64
        - name: before
          in: query
          description: ID поста для выбора постов, которые были до этого. Не должен
            использоваться с around
          schema:
            type: string
        - name: after
          in: query
          description: ID поста для выбора постов, которые были после этого. Не должен
            использоваться с around
          schema:
            type: string
        - name: around
          in: query
          description: >
            ID поста, вокруг которого нужно получить посты. Возвращает примерно
            половину постов до и половину после указанного поста, включая сам
            целевой пост. Не должен использоваться с since, before, after
          schema:
            type: string
        - name: skipFetchThreads
          in: query
          description: Пропустить ли получение веток или нет
          schema:
            type: boolean
            default: false
        - name: collapsedThreads
          in: query
          description: Использует ли клиент CRT или нет
          schema:
            type: boolean
            default: false
        - name: collapsedThreadsExtended
          in: query
          description: |
            Возвращать ли связанных пользователей как часть ответа или нет
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Успешное получение списка постов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
