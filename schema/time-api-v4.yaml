                  type: string
                  description: Неуникальное имя для отображения канала
                purpose:
                  type: string
                  description: |
                    Краткое описание цели канала
                header:
                  type: string
                  description: |
                    Текст в формате Markdown для отображения в заголовке канала
                type:
                  $ref: "#/components/schemas/NewChannelType"
                  description: |
                    'O' для публичного канала, 'P' для частного канала
        description: Объект канала, который будет создан
        required: true
      responses:
        "201":
          description: Успешное создание канала
          content:
            application/json:
              schema:
