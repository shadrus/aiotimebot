        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v4/server_busy:
    post:
      tags:
        - System
      summary: Установить флаг высокой нагрузки на сервере
      description: >
        Помечает сервер как находящийся под высокой нагрузкой, что отключает
        некритические службы, такие как поиск, статусы и уведомления о наборе
        текста.


        __Минимальная версия сервера__: 5.20


        ##### Разрешения

        Необходимо иметь разрешение `manage_system`.
      operationId: SetServerBusy
      parameters:
        - name: seconds
          in: query
          required: false
          description: >
            Количество секунд до автоматической отмены флага высокой нагрузки на
            сервере.
          schema:
            type: string
            default: "3600"
      responses:
        "200":
          description: Флаг высокой нагрузки на сервере успешно установлен
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-codeSamples:
        - lang: curl
          source: |
            curl -X POST \
              'https://time-url.domain/api/v4/server_busy?seconds=3600' \
              -H 'Authorization: Bearer kno8tcdotpbx3dj1gzcbx9jrqy'
    get:
      tags:
        - System
      summary: Получить время истечения флага высокой нагрузки на сервере.
      description: >
        Получает временную метку, соответствующую времени, когда флаг высокой
        нагрузки на сервере будет автоматически снят.


        __Минимальная версия сервера__: 5.20


        ##### Разрешения

        Необходимо иметь разрешение `manage_system`.
      operationId: GetServerBusyExpires
      responses:
        "200":
          description: Время истечения флага высокой нагрузки на сервере успешно получено
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server_Busy"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-codeSamples:
        - lang: curl
          source: |
            curl -X GET \
              'https://time-url.domain/api/v4/server_busy' \
              -H 'Authorization: Bearer kno8tcdotpbx3dj1gzcbx9jrqy' \
              -H 'Content-Type: application/json'
    delete:
      tags:
        - System
      summary: Снять флаг высокой нагрузки на сервере
      description: >
        Помечает сервер как не находящийся под высокой нагрузкой, что повторно
        включает некритические службы, такие как поиск, статусы и уведомления о
        наборе текста.


        __Минимальная версия сервера__: 5.20


        ##### Разрешения

        Необходимо иметь разрешение `manage_system`.
      operationId: ClearServerBusy
      responses:
        "200":
          description: Флаг высокой нагрузки на сервере успешно снят
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "403":
          $ref: "#/components/responses/Forbidden"
      x-codeSamples:
        - lang: curl
          source: |
            curl -X DELETE \
              'https://time-url.domain/api/v4/server_busy' \
              -H 'Authorization: Bearer kno8tcdotpbx3dj1gzcbx9jrqy'
