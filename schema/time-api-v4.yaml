          description: >
            Формат - это название формата изображения, используемого image/go,
            например, "png", "gif" или "jpeg".
        frame_count:
          type: integer
          description: >
            FrameCount хранит количество кадров в этом изображении, если это
            анимированный gif. Для других форматов будет 0.
      required:
        - width
        - height
        - format
        - frame_count
    TeamMap:
