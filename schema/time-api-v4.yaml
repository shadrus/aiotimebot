    TeamMember:
      type: object
      properties:
        team_id:
          description: ID команды, к которой принадлежит этот участник.
          type: string
        user_id:
          description: ID пользователя, к которому относится этот участник.
          type: string
        roles:
          description: >
            Полный список ролей, назначенных этому участнику команды, в виде
            списка имен ролей, разделенных пробелами, включая любые роли,
            предоставленные неявно через схемы разрешений.
          type: string
        delete_at:
          description: |
            Время в миллисекундах, когда этот участник команды был удален.
          type: integer
          format: int64
        scheme_restricted_guest:
          type: boolean
        scheme_guest:
          type: boolean
        scheme_user:
          description: >
            Является ли этот участник команды обладателем роли пользователя по
            умолчанию, определенной схемой разрешений команды.
          type: boolean
        scheme_admin:
          description: >
            Является ли этот участник команды обладателем роли администратора по
            умолчанию, определенной схемой разрешений команды.
          type: boolean
        explicit_roles:
          description: >
            Список ролей, явно назначенных этому участнику команды, в виде
            списка имен ролей, разделенных пробелами. Этот список *не* включает
            роли, предоставленные неявно через схемы разрешений.
          type: string
      required:
        - team_id
        - user_id
        - roles
        - delete_at
        - scheme_restricted_guest
        - scheme_guest
