      responses:
        "200":
          description: Успешное получение статуса постов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostsStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
