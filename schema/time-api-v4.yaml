        - total
    PostMetadata:
      type: object
      description: Дополнительная информация, используемая для отображения сообщения.
      properties:
        embeds:
          type: array
          description: >
            Информация о содержимом, встроенном в сообщение, включая
            предварительные просмотры OpenGraph, предварительные просмотры
            ссылок на изображения и вложения сообщений. Это поле будет null,
            если сообщение не содержит встроенного содержимого.
          items:
            type: object
            properties:
              type:
                type: string
                description: Тип содержимого, встроенного в это сообщение.
                enum:
                  - image
                  - message_attachment
                  - opengraph
                  - link
                  - quote
                  - permalink
              url:
                type: string
                description: URL встроенного содержимого, если он существует.
              data:
                $ref: "#/components/schemas/PostEmbedData"
                description: >
                  Любая дополнительная информация о встроенном содержимом. В
                  настоящее время

                  используется только для хранения метаданных OpenGraph.

                  Это поле будет null для не-OpenGraph встраиваний.
        emojis:
          type: array
          description: >
            Пользовательские эмодзи, которые появляются в этом сообщении или
            были использованы в реакциях на это сообщение. Это поле будет null,
            если сообщение не содержит пользовательских эмодзи.
          items:
            $ref: "#/components/schemas/Emoji"
        files:
          type: array
          description: >
            Объекты FileInfo для любых файлов, прикрепленных к сообщению. Это
            поле будет null, если сообщение не имеет вложений файлов.
          items:
            $ref: "#/components/schemas/FileInfo"
        images:
          type: object
          description: >
            Объект, сопоставляющий URL внешнего изображения с объектом,
            содержащим размеры этого изображения. Это поле будет null, если
            сообщение или его встроенное содержимое не ссылается на внешние
            изображения.
          additionalProperties:
            $ref: "#/components/schemas/PostImage"
        reactions:
          type: array
          description: >
            Любые реакции на это сообщение. Это поле будет null, если на это
            сообщение не было реакций.
          items:
            $ref: "#/components/schemas/Reaction"
    PostEmbedData:
      type: object
