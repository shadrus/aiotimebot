        позволит включить push-уведомления для пользователя, если они настроены
        сервером.

        Одна сессия может настроить либо веб push-уведомления через
        /users/sessions/pwa, либо уведомления мобильного приложения через
        /users/sessions/device. Последний вызов переопределит предыдущий.

        ##### Разрешения

        Должен быть аутентифицирован.
      operationId: AttachDeviceId
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - device_id
              properties:
                device_id:
                  description: >
                    Идентификатор мобильного устройства. Для Android добавьте
                    префикс `android:`, для Apple - `apple:`
                  type: string
        required: true
      responses:
        "200":
          description: Успешная привязка идентификатора устройства
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
