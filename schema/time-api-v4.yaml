                  type: string
                work_scheme:
                  type: string
                department:
                  type: string
                position:
                  type: string
                  description: Содержит описание из нового профиля.
                birthday:
                  type: string
                  description: >
                    День рождения в формате RFC3339,
                    https://www.rfc-editor.org/rfc/rfc3339.
                profile_url:
                  type: string
                  description: |
                    Ссылка на профиль на другой платформе.
