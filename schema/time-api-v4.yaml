        - name: page
          in: query
          description: Выбранная страница.
          schema:
            type: integer
            default: 0
        - name: per_page
          in: query
          description: Количество задач на странице.
          schema:
            type: integer
            default: 60
      responses:
        "200":
          description: Успешное получение списка задач
