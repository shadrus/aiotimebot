  /api/v4/logs:
    get:
      tags:
        - System
      summary: Получить логи
      description: >
        Получить страницу логов сервера, выбранную с помощью параметров запроса
        `page` и `logs_per_page`.

        ##### Разрешения

        Необходимо иметь разрешение `manage_system`.
      operationId: GetLogs
      parameters:
        - name: page
          in: query
          description: Выбранная страница.
          schema:
            type: integer
            default: 0
        - name: logs_per_page
          in: query
          description: >
            Количество логов на странице. Максимальный лимит составляет 10000
            логов на страницу.
          schema:
            type: string
            default: "10000"
      responses:
        "200":
          description: Успешное получение логов
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags:
        - System
      summary: Добавить сообщение в лог
      description: >
        Добавить сообщения в логи сервера.

        ##### Разрешения

        Пользователи с разрешением `manage_system` могут логировать сообщения
        уровня ERROR или DEBUG.

        Вошедшие пользователи могут логировать сообщения уровня ERROR или DEBUG,
        когда `ServiceSettings.EnableDeveloper` установлено в `true`, или только
        сообщения уровня DEBUG, когда `false`.

        Не вошедшие пользователи могут логировать сообщения уровня ERROR или
        DEBUG, когда `ServiceSettings.EnableDeveloper` установлено в `true`, и
        не могут логировать, когда `false`.
      operationId: PostLog
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - level
                - message
              properties:
                level:
                  type: string
                  description: Уровень ошибки, ERROR или DEBUG
                message:
                  type: string
                  description: Сообщение для отправки в логи сервера
        required: true
      responses:
        "200":
          description: Логи успешно отправлены
          content:
            application/json:
              schema:
                type: object
                items:
                  type: string
        "403":
          $ref: "#/components/responses/Forbidden"
