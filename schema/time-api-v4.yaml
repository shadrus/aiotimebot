  /api/v4/actions/dialogs/open:
    post:
      tags:
        - Integration actions
      summary: Открыть диалог
      description: |
        Открыть интерактивный диалог, используя ID триггера, предоставленный слэш-командой или другим действием. См. [Admin Guide: Интерактивные диалоги](https://docs.time-messenger.ru/integrations/interactive_dialogs/) для получения дополнительной информации об интерактивных диалогах.
        __Минимальная версия сервера: 5.6__
      operationId: OpenInteractiveDialog
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - trigger_id
                - url
                - dialog
              properties:
                trigger_id:
                  type: string
                  description: ID триггера, предоставленный другим действием
                url:
                  type: string
                  description: URL для отправки данных диалога
                dialog:
                  type: object
                  required:
                    - title
                    - elements
                  description: Объект поста для создания
                  properties:
                    callback_id:
                      type: string
                      description: >
                        Установите ID, который будет включен при отправке диалога
                    title:
                      type: string
                      description: Заголовок диалога
                    introduction_text:
                      type: string
                      description: Вводный абзац в формате Markdown
                    elements:
                      type: array
                      description: Элементы ввода
                      items:
                        type: object
                    submit_label:
                      type: string
                      description: Надпись на кнопке отправки
                    notify_on_cancel:
                      type: boolean
                      description: >
                        Установите значение true, чтобы получать данные, когда
                        пользователь отменяет диалог
                    state:
                      type: string
                      description: >
                        Установите состояние, которое будет возвращено с
                        отправкой диалога
        description: Метаданные для открытия диалога
        required: true
      responses:
        "200":
          description: Диалог успешно открыт
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "400":
          $ref: "#/components/responses/BadRequest"
  /api/v4/actions/dialogs/submit:
    post:
      tags:
        - Integration actions
      summary: Отправить диалог
      description: |
        Конечная точка, используемая клиентами Time для отправки диалога.
        __Минимальная версия сервера: 5.6__
      operationId: SubmitInteractiveDialog
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - submission
                - channel_id
                - team_id
              properties:
                url:
                  type: string
                  description: URL для отправки данных о диалоге
                channel_id:
                  type: string
                  description: ID канала, из которого пользователь отправил диалог
                team_id:
                  type: string
                  description: ID команды, из которой пользователь отправил диалог
                submission:
                  type: object
                  description: >
                    Карта строк, где ключи - это имена элементов, а значения -
                    значения ввода элемента
                callback_id:
                  type: string
                  description: ID обратного вызова, отправленный при открытии диалога
                state:
                  type: string
                  description: Состояние, отправленное при открытии диалога
                cancelled:
                  type: boolean
                  description: Установите значение true, если диалог был отменен
        description: Данные о подаче диалога
        required: true
      responses:
        "200":
          description: Диалог успешно отправлен
