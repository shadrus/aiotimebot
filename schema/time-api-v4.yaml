  /api/v4/users/search:
    post:
      tags:
        - Users
      summary: Поиск пользователей
      description: >
        Получить список пользователей на основе критериев поиска, указанных в
        теле запроса. Поиск обычно выполняется по имени пользователя, полному
        имени, псевдониму и электронной почте, если сервер не настроен иначе.

        ##### Разрешения

        Требуется активная сессия и разрешения `read_channel` и/или `view_team`
        для любых каналов или команд, указанных в теле запроса.
      operationId: SearchUsers
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - term
              properties:
                term:
                  description: >
                    Термин для сопоставления с именем пользователя, полным
                    именем, псевдонимом и электронной почтой
                  type: string
                team_id:
                  description: Если указано, искать пользователей только в этой команде
                  type: string
                not_in_team_id:
                  description: Если указано, искать пользователей только не в этой команде
                  type: string
                in_channel_id:
                  description: Если указано, искать пользователей только в этом канале
                  type: string
                not_in_channel_id:
                  description: >
                    Если указано, искать пользователей только не в этом канале.
                    Необходимо указать `team_id` при использовании этой опции
                  type: string
                in_group_id:
                  description: >
                    Если указано, искать пользователей только в этой группе.
                    Если запрос от администратора - будут возвращены все
                    пользователи. Если запрос от обычного пользователя - ответ
                    будет содержать только пользователей, которые находятся в
                    той же команде, что и автор запроса.
                  type: string
                group_constrained:
                  description: >
                    При использовании с `not_in_channel_id` или
                    `not_in_team_id`, возвращает только пользователей, которым
                    разрешено присоединяться к каналу или команде на основе их
                    ограничений группы.
                  type: boolean
                allow_inactive:
                  description: >
                    Если `true`, включать деактивированных пользователей в
                    результаты
                  type: boolean
                without_team:
                  type: boolean
                  description: >
                    Установите это значение в `true`, если хотите искать
                    пользователей, которые не находятся в команде. Эта опция
                    имеет приоритет над `team_id`, `in_channel_id` и
                    `not_in_channel_id`.
                limit:
                  description: >
                    Максимальное количество пользователей, возвращаемых в
                    результатах

                    __Доступно с версии сервера 5.6. По умолчанию `100`, если не
                    указано или на более ранней версии сервера.__
                  type: integer
                  default: 100
                with_profiles:
                  type: boolean
                  default: false
                  description: >
                    Определяет, будут ли возвращены профили найденных
                    пользователей.
        description: Критерии поиска
        required: true
      responses:
        "200":
          description: Успешное получение списка пользователей
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /api/v4/users/autocomplete:
    get:
      tags:
        - Users
      summary: Автозаполнение пользователей
      description: >
        Получить список пользователей для автозаполнения на основе
        предоставленного термина поиска. Укажите комбинацию `in_team` и
        `in_channel`, чтобы дополнительно отфильтровать результаты.

        ##### Разрешения

        Требуется активная сессия и разрешения `view_team` и `read_channel` для
        любых команд или каналов, используемых для дальнейшей фильтрации
        результатов.
      operationId: AutocompleteUsers
      parameters:
        - name: in_team
          in: query
          description: ID команды
          schema:
            type: string
        - name: in_channel
          in: query
          description: ID канала
          schema:
            type: string
        - name: name
          in: query
          description: Имя пользователя, псевдоним, имя или фамилия
          required: true
          schema:
            type: string
        - name: allow_inactive
          in: query
          description: >
            Если установлено в true, результат будет содержать активированных и
            деактивированных пользователей, в противном случае только
            активированных пользователей
          required: false
          schema:
            type: boolean
            default: false
        - name: role
          in: query
          description: фильтровать пользователей по роли
          schema:
            type: string
        - name: is_bot
          in: query
          description: >
            Если установлено в true, результат будет содержать только ботов.
            Если установлено в false, результат будет содержать только
            пользователей. Если не установлено, результат будет содержать
            пользователей и ботов
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          description: >
            Максимальное количество пользователей, возвращаемых в каждом
            подрезультате

            __Доступно с версии сервера 5.6. По умолчанию `100`, если не указано
            или на более ранней версии сервера.__
          schema:
            type: integer
            default: 100
        - name: boost
          in: query
          description: >
            Если установлено в true, пользователи, с которыми общался
            пользователь, размещаются в начале [0; boost_limit) ответа поиска, а
            другие пользователи размещаются в [boost_limit; search_limit).
            Сейчас boost_limit == search_limit, мы пытаемся повысить всех
            пользователей, если можем.

            __Минимальная версия сервера__: 6.56
          required: false
          schema:
            type: boolean
            default: false
        - name: with_profiles
          in: query
          description: |
            Определяет, будут ли возвращены профили найденных пользователей.
          required: false
          schema:
            type: boolean
            default: false
        - name: source
          in: query
          descriprion: >
            Определяет, откуда пришел запрос. Поиск или тэг пользователей Если
            нет, то считается, что это поиск
          required: false
          schema:
            type: string
            enum:
              - search-user
              - tag-user
      responses:
        "200":
          description: Успешное автозаполнение пользователей (с усилением)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAutocomplete"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
