openapi: 3.0.0
info:
  version: "4.0"
  title: Справочник Time API
tags:
  - name: Введение
    description: >
      API веб-сервисов Time используется клиентами Time и сторонними
      приложениями для взаимодействия с сервером.
  - name: Схема
    description: >
      Доступ ко всем API осуществляется через HTTPS запросы по адресу `/api/v4`.
      Все тела запросов и ответов имеют формат `application/json`.


      При использовании конечных точек, требующих идентификатор пользователя,
      строка `me` может быть использована вместо идентификатора пользователя,
      чтобы указать, что действие должно быть выполнено для вошедшего в систему
      пользователя.


      Полное описание API доступно в формате OpenAPI (`openapi.yaml`) по адресу
      [OpenAPI спецификация](/openapi.yaml). Файл можно использовать для
      генерации клиентских SDK с помощью соответствующих инструментов.
  - name: Аутентификация
    description: |
      Существует несколько способов аутентификации с использованием API Time.

      Все примеры предполагают, что экземпляр Time запущен по адресу http://localhost:8065.

      #### Токен сессии

      Выполните HTTP POST запрос на `/api/v4/users/login` с JSON телом, указывающим `login_id` пользователя, `password` и, при необходимости, MFA `token`. `login_id` может быть электронной почтой, именем пользователя или AD/LDAP ID в зависимости от конфигурации системы.

      ```
      curl -i -d '{"login_id":"someone@nowhere.com","password":"thisisabadpassword"}' http://localhost:8065/api/v4/users/login
      ```

      ПРИМЕЧАНИЕ: Если вы запускаете cURL на Windows, вам нужно будет заменить одинарные кавычки на двойные и экранировать внутренние двойные кавычки с помощью обратного слэша, как показано ниже:

      ```
      curl -i -d '{"login_id":"someone@nowhere.com","password":"thisisabadpassword"}' http://localhost:8065/api/v4/users/login
      ```

      Если запрос успешен, ответ будет содержать заголовок `Token` и объект пользователя в теле.

      ```
      HTTP/1.1 200 OK
      Set-Cookie: MMSID=hyr5dmb1mbb49c44qmx4whniso; Path=/; Max-Age=2592000; HttpOnly
      Token: hyr5dmb1mbb49c44qmx4whniso
      X-Ratelimit-Limit: 10
      X-Ratelimit-Remaining: 9
      X-Ratelimit-Reset: 1
      X-Request-Id: smda55ckcfy89b6tia58shk5fh
      X-Version-Id: developer
      Date: Fri, 11 Sep 2015 13:21:14 GMT
      Content-Length: 657
      Content-Type: application/json; charset=utf-8

      {{user object as json}}
      ```

      Включите `Token` как часть заголовка `Authorization` в ваших будущих API запросах с использованием метода `Bearer`.

      ```
      curl -i -H 'Authorization: Bearer hyr5dmb1mbb49c44qmx4whniso' http://localhost:8065/api/v4/users/me
      ```

      Теперь вы должны иметь возможность получить доступ к API как пользователь, под которым вы вошли.

      #### Персональные токены доступа

      Использование [персональных токенов доступа](https://docs.time-messenger.ru/user-guide/personal-access-tokens/) очень похоже на использование токена сессии. Единственное реальное отличие заключается в том, что токены сессии истекают, а персональные токены доступа будут действовать до тех пор, пока они не будут вручную отозваны пользователем или администратором.

      Так же, как и токены сессии, включите персональный токен доступа как часть заголовка `Authorization` в ваших запросах, используя метод `Bearer`. Предположим, что наш персональный токен доступа - `9xuqwrwgstrb3mzrxb83nb357a`, мы могли бы использовать его, как показано ниже.

      ```
      curl -i -H 'Authorization: Bearer 9xuqwrwgstrb3mzrxb83nb357a' http://localhost:8065/api/v4/users/me
      ```

      #### OAuth 2.0

      Time имеет возможность выступать в качестве [поставщика услуг OAuth 2.0](https://tools.ietf.org/html/rfc6749).
  - name: Ошибки
    description: >
      Все ошибки вернут соответствующий код ответа HTTP вместе со следующим
      телом JSON:

      ```

      {
          "id": "the.error.id",
          "message": "Что-то пошло не так", // причина ошибки
          "request_id": "", // ID запроса
          "status_code": 0, // код статуса HTTP
          "is_oauth": false // относится ли ошибка к OAuth
      }

      ```
  - name: Лимитирование запросов
    description: >
      Каждый раз, когда вы делаете HTTP-запрос к API Time, вы можете заметить
      следующие заголовки, включенные в ответ:

      ```

      X-Ratelimit-Limit: 10

      X-Ratelimit-Remaining: 9

      X-Ratelimit-Reset: 1441983590

      ```


      Эти заголовки сообщают вам о текущем статусе лимитирования запросов.


      | Заголовок | Описание |

      | --------- | -------- |

      | X-Ratelimit-Limit | Максимальное количество запросов, которые вы можете
      сделать в секунду. |

      | X-Ratelimit-Remaining | Количество оставшихся запросов в текущем окне. |

      | X-Ratelimit-Reset | Оставшееся количество секунд эпохи UTC до сброса
      лимита запросов. |


      Если вы превысите лимит запросов для окна, вы получите следующую ошибку в
      теле ответа:


      ```

      HTTP/1.1 429 Too Many Requests

      Date: Tue, 10 Sep 2015 11:20:28 GMT

      X-RateLimit-Limit: 10

      X-RateLimit-Remaining: 0

      X-RateLimit-Reset: 1


      limit exceeded

      ```
  - name: Веб-сокет
    description: >
      В дополнение к HTTP RESTful веб-сервису, Time также предлагает систему
      доставки веб-сокет событий и некоторую функциональность API.


      Чтобы подключиться по веб-сокету, выполните стандартное открытие
      рукопожатия, как [определено спецификацией
      RFC](https://tools.ietf.org/html/rfc6455#section-1.3) к конечной точке
      `/api/v4/websocket` Time.


      #### Аутентификация


      Веб-сокет Time может быть аутентифицирован с использованием [стандартных
      методов аутентификации API](../v4/аутентификация) (с помощью cookie или с
      явным заголовком Authorization) или через вызов аутентификации. Если вы
      аутентифицируетесь из браузера и вошли в систему с помощью API Time, ваш
      cookie аутентификации уже должен быть установлен. Именно так
      веб-приложение Time аутентифицируется с веб-сокетами.


      Чтобы аутентифицироваться с вызовом аутентификации, сначала подключите
      веб-сокеты, а затем отправьте следующий JSON через соединение:


      ```

      {
        "seq": 1,
        "action": "authentication_challenge",
        "data": {
          "token": "time-token-goes-here"
        }
      }

      ```


      Если успешно, вы получите стандартный ответ OK через веб-сокет соединение:


      ```

      {
        "status": "OK",
        "seq_reply": 1
      }

      ```


      После успешной аутентификации сервер передаст веб-сокет событие `hello`,
      содержащее версию сервера через соединение.


      #### События


      Веб-сокет события в основном используются для уведомления клиента о
      изменениях в Time, таких как доставка новых сообщений или уведомление
      клиента о том, что другой пользователь печатает в канале.


      Веб-сокеты события будут иметь форму:


      ```

      {
        "event": "hello",
        "data": {
          "server_version": "3.6.0.1451.1c38da627ebb4e3635677db6939e9195"
        },
        "broadcast":{
          "omit_users": null,
          "user_id": "ay5sq51sebfh58ktrce5ijtcwy",
          "channel_id": "",
          "team_id": ""
        },
        "seq": 0
      }

      ```


      Поле `event` указывает тип события, `data` содержит любые данные,
      относящиеся к событию, а `broadcast` содержит информацию о том, кому было
      отправлено событие. Например, в приведенном выше примере `user_id`
      установлен на "ay5sq51sebfh58ktrce5ijtcwy", что означает, что только
      пользователь с этим идентификатором получил это событие. Поле `omit_users`
      может содержать массив идентификаторов пользователей, которые были
      специально исключены из получения события.


      Список веб-сокет событий Time:

      - added_to_team

      - authentication_challenge

      - channel_converted

      - channel_created

      - channel_deleted

      - channel_member_updated

      - channel_updated

      - channel_viewed

      - config_changed

      - delete_team

      - direct_added

      - emoji_added

      - ephemeral_message

      - group_added

      - hello

      - leave_team

      - license_changed

      - memberrole_updated

      - new_user

      - plugin_disabled

      - plugin_enabled

      - plugin_statuses_changed

      - post_deleted

      - post_edited

      - post_unread

      - posted

      - preference_changed

      - preferences_changed

      - preferences_deleted

      - reaction_added

      - reaction_removed

      - response

      - role_updated

      - status_change

      - typing

      - update_team

      - user_added

      - user_removed

      - user_role_updated

      - user_updated

      - dialog_opened

      - thread_updated

      - thread_follow_changed

      - thread_read_changed

      - file_deleted
  - name: Веб-сокет API
    description: |
      Time имеет базовую поддержку Веб-сокет API. Подключенный веб-сокет может отправлять запросы, отправляя следующее через соединение:

      ```
      {
        "action": "user_typing",
        "seq": 2,
        "data": {
          "channel_id": "nhze199c4j87ped4wannrjdt9c",
          "parent_id": ""
        }
      }
      ```

      Это пример запроса `user_typing`, цель которого - уведомить сервер о том, что подключенный клиент начал печатать в канале или ветке. Поле `action` указывает, что запрашивается, и выполняет аналогичную функцию маршрута в HTTP API. Поле `data` используется для добавления любых дополнительных данных вместе с запросом. Сервер также поддерживает бинарные сообщения WebSocket в случае, если у клиента есть такая потребность.

      `seq` или номер последовательности устанавливается клиентом и должен увеличиваться с каждым использованием. Он используется для различения ответов на запросы, которые приходят через веб-сокет. Например, стандартный ответ на вышеуказанный запрос будет:

      ```
      {
        "status": "OK",
        "seq_reply": 2
      }
      ```

      Обратите внимание, что `seq_reply` равен 2, совпадая с `seq` оригинального запроса. Используя это, клиент может различить, для какого запроса предназначен ответ.

      Если была какая-либо информация для ответа, она будет заключена в поле `data`.

      В случае ошибки ответ будет:

      ```
      {
        "status": "FAIL",
        "seq_reply": 2,
        "error": {
          "id": "some.error.id.here",
          "message": "Some error message here"
        }
      }
      ```

      Список действий API WebSocket:
      - user_typing
      - get_statuses_by_ids
      - update_presence

      ### Действие `update_presence`
      Устанавливает текущее присутствие пользователя в канале/ветке. Используется для получения событий `typing`.
      Если поля установлены в пустую строку (`""`) - событие `typing` не будет получено.
      Это действие должно быть отправлено хотя бы один раз, иначе все события `typing` будут получены.
      Пример:
      ```
      {
        "action": "update_presence",
        "seq": 2,
        "data": {
          "channel_id": "nhze199c4j87ped4wannrjdt9c",
          "thread_id": ""
        }
      }
      ```
      ### Событие `thread_read_changed`
      - [Отметить все ветки, которые пользователь отслеживает, как прочитанные](../v4/update-thread-read-for-user) `PUT /users/{user_id}/teams/{team_id}/threads/read`

      Пример:
      ```
      {
        "event": "thread_read_changed",
        "data": {},
        "broadcast": {
          "omit_users": null,
          "user_id": "87icc7gj8png9raxzz3t3ym7dy",
          "channel_id": "",
          "team_id": "k1bjiqyu37r7mp76zbnju4dzby",
          "contains_sanitized_data": false,
          "contains_sensitive_data": false
        },
        "seq": 2
      }
      ```
      - [Отметить ветку как прочитанную до определенного времени](../v4/update-thread-read-for-user) `PUT /users/{user_id}/teams/{team_id}/threads/{thread_id}/read/{timestamp}`
      Данные: - channel_id: - thread_id: - timestamp: то же, что и ThreadMemberships.LastViewed после обновления - unread_mentions: то же, что и ThreadMemberships.UnreadMentions после обновления - unread_replies: вычисляется по ветке после обновления - previous_unread_mentions: то же, что и ThreadMemberships.UnreadMentions до обновления - previous_unread_replies: вычисляется по ветке до обновления - previous_timestamp: то же, что и ThreadMemberships.LastViewed до обновления
      Пример:
      ```
      {
        "event": "thread_read_changed",
        "data": {
          "channel_id": "f4hqkj8ifjy5zpqr5nyjrrajsy",
          "previous_unread_mentions": 0,
          "previous_unread_replies": 5,
          "thread_id": "ag1654pt3pdcfpfakxi774co6w",
          "timestamp": 1706274237704,
          "previous_timestamp": 1706274203704,
          "unread_mentions": 0,
          "unread_replies": 0
        },
        "broadcast": {
          "omit_users": null,
          "user_id": "87icc7gj8png9raxzz3t3ym7dy",
          "channel_id": "",
          "team_id": "k1bjiqyu37r7mp76zbnju4dzby",
          "contains_sanitized_data": false,
          "contains_sensitive_data": false
        },
        "seq": 2
      }
      ```
      - Отметить ветку как непрочитанную с поста `POST (/users/{user_id}/teams/{team_id}/threads/{thread_id}/set_unread/{post_id}`
      Данные: - channel_id: - thread_id: - timestamp: то же, что и ThreadMemberships.LastViewed после обновления - unread_mentions: то же, что и ThreadMemberships.UnreadMentions после обновления - unread_replies: вычисляется по ветке после обновления - previous_unread_mentions: то же, что и ThreadMemberships.UnreadMentions до обновления - previous_unread_replies: вычисляется по ветке до обновления - previous_timestamp: то же, что и ThreadMemberships.LastViewed до обновления
      Broadcast: user_id, team_id

      Пример:
      ```
      {
        "event": "thread_read_changed",
        "data": {
          "channel_id": "f4hqkj8ifjy5zpqr5nyjrrajsy",
          "previous_unread_mentions": 0,
          "previous_unread_replies": 0,
          "thread_id": "ag1654pt3pdcfpfakxi774co6w",
          "timestamp": 1706268533024,
          "previous_timestamp": 1706268502024,
          "unread_mentions": 0,
          "unread_replies": 6
        },
        "broadcast": {
          "omit_users": null,
          "user_id": "87icc7gj8png9raxzz3t3ym7dy",
          "channel_id": "",
          "team_id": "k1bjiqyu37r7mp76zbnju4dzby",
          "contains_sanitized_data": false,
          "contains_sensitive_data": false
        },
        "seq": 3
      }
      ```
