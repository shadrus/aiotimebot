name: CI

"on":
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen --all-groups

      - name: Run tests
        run: uv run --frozen pytest

  quality:
    name: Ruff and mypy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen --all-groups

      - name: Run Ruff
        run: uv run --frozen ruff check .

      - name: Run strict mypy
        run: uv run --frozen mypy

  build:
    name: Build distributions
    needs: [test, quality]
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Build wheel and source distribution
        run: uv build --no-sources

      - name: Verify wheel installation
        run: |
          uv venv --python 3.12 .wheel-venv
          uv pip install --python .wheel-venv/bin/python dist/*.whl
          .wheel-venv/bin/python -c "from aiotimebot import TimeClient"

      - name: Upload distributions
        uses: actions/upload-artifact@v6
        with:
          name: aiotimebot-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 30
